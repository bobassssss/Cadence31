<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annuaire</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #252a38;
      --accent: #e8a94d;
      --accent2: #5c8fff;
      --text: #dde1ec;
      --muted: #6b7291;
      --tel-color: #4dcc8a;
      --mail-color: #5c8fff;
      --copy-color: #e8a94d;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      max-width: 620px;
      margin: 0 auto 36px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
    header p  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    /* ─── SEARCH ─────────────────────────────────── */
    .search-wrap {
      max-width: 620px;
      margin: 0 auto 24px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px 11px 40px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      outline: none;
      transition: border .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap .icon-search {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--muted);
      pointer-events: none;
    }

    /* ─── TREE ───────────────────────────────────── */
    .tree {
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Niveau 1 */
    .level1 {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .level1-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .level1-header:hover { background: #1e2332; }
    .level1-header .arrow {
      font-size: 11px; color: var(--muted);
      transition: transform .25s ease;
      flex-shrink: 0;
    }
    .level1.open .level1-header .arrow { transform: rotate(90deg); }
    .level1-header .folder-icon { font-size: 18px; flex-shrink: 0; }
    .level1-header .title {
      font-size: .95rem; font-weight: 700;
      letter-spacing: .3px;
      flex: 1;
    }
    .level1-header .badge {
      font-family: 'DM Mono', monospace;
      font-size: .7rem; color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .level1-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 10px;
    }
    .level1.open .level1-body { display: flex; flex-direction: column; gap: 8px; }

    /* Niveau 2 */
    .level2 {
      background: #12161f;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .level2-header {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 13px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .level2-header:hover { background: #1a1f2e; }
    .level2-header .arrow {
      font-size: 10px; color: var(--muted);
      transition: transform .25s ease;
      flex-shrink: 0;
    }
    .level2.open .level2-header .arrow { transform: rotate(90deg); }
    .level2-header .folder-icon { font-size: 15px; flex-shrink: 0; }
    .level2-header .title {
      font-size: .88rem; font-weight: 500;
      flex: 1;
    }
    .level2-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .level2.open .level2-body { display: flex; }

    /* Coordonnées */
    .coord {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      text-decoration: none;
      color: inherit;
    }
    .coord .coord-icon { font-size: 16px; flex-shrink: 0; }
    .coord .coord-label {
      font-size: .78rem; color: var(--muted);
      flex-shrink: 0; min-width: 90px;
    }
    .coord .coord-value {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      flex: 1;
      word-break: break-all;
    }
    .coord .coord-action {
      font-size: .7rem; font-family: 'DM Mono', monospace;
      padding: 3px 8px; border-radius: 5px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .coord:hover .coord-action { opacity: 1; }

    /* Tel */
    .coord.tel { border-color: rgba(77,204,138,.12); }
    .coord.tel:hover { background: rgba(77,204,138,.07); border-color: rgba(77,204,138,.3); }
    .coord.tel .coord-icon { color: var(--tel-color); }
    .coord.tel .coord-value { color: var(--tel-color); }
    .coord.tel .coord-action { background: rgba(77,204,138,.15); color: var(--tel-color); }

    /* Mail */
    .coord.mail { border-color: rgba(92,143,255,.12); }
    .coord.mail:hover { background: rgba(92,143,255,.07); border-color: rgba(92,143,255,.3); }
    .coord.mail .coord-icon { color: var(--mail-color); }
    .coord.mail .coord-value { color: var(--mail-color); }
    .coord.mail .coord-action { background: rgba(92,143,255,.15); color: var(--mail-color); }

    /* Copy */
    .coord.copy { border-color: rgba(232,169,77,.12); }
    .coord.copy:hover { background: rgba(232,169,77,.07); border-color: rgba(232,169,77,.3); }
    .coord.copy .coord-icon { color: var(--copy-color); }
    .coord.copy .coord-value { color: var(--text); }
    .coord.copy .coord-action { background: rgba(232,169,77,.15); color: var(--copy-color); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--accent);
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      padding: 10px 18px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* recherche : éléments cachés */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">📒</div>
  <div>
    <h1>Annuaire</h1>
    <p>Cliquez pour appeler · Envoyer un mail · Copier</p>
  </div>
</header>

<div class="search-wrap">
  <span class="icon-search">🔍</span>
  <input type="text" id="searchInput" placeholder="Rechercher un service, un numéro..." />
</div>

<div class="tree" id="tree"></div>
<div id="toast">✅ Copié !</div>

<script>
/*
 ╔══════════════════════════════════════════════════════════╗
 ║  DONNÉES — MODIFIEZ CETTE SECTION POUR PERSONNALISER    ║
 ╚══════════════════════════════════════════════════════════╝

 Structure :
 {
   "Nom du dossier racine": {
     "Nom du service": [
       { type: "tel",  label: "Nom affiché", value: "0600000000" },
       { type: "mail", label: "Nom affiché", value: "adresse@mail.fr" },
       { type: "copy", label: "Nom affiché", value: "Texte à copier" }
     ]
   }
 }

 Types disponibles :
   "tel"  → clic = appel téléphonique (fonctionne sur mobile)
   "mail" → clic = ouvre le client mail
   "copy" → clic = copie le texte dans le presse-papiers
*/

const ANNUAIRE = {

  "📂 Pour moi": {

    "Ressources Humaines": [
      { type: "tel",  label: "Standard",      value: "0123456789" },
      { type: "mail", label: "Contact RH",    value: "rh@entreprise.fr" }
    ],

    "Comptabilité": [
      { type: "tel",  label: "Direct",        value: "0123456780" },
      { type: "mail", label: "Factures",      value: "compta@entreprise.fr" }
    ],

    "Service Informatique": [
      { type: "tel",  label: "Hotline IT",    value: "0123456781" },
      { type: "mail", label: "Support",       value: "it@entreprise.fr" }
    ],

    "Direction": [
      { type: "tel",  label: "Secrétariat",   value: "0123456782" },
      { type: "mail", label: "Direction",     value: "direction@entreprise.fr" }
    ]

  },

  "📂 Pour mon client": {

    "Service Commercial": [
      { type: "tel",  label: "Commercial",    value: "0612345678" },
      { type: "mail", label: "Devis",         value: "commercial@fournisseur.fr" },
      { type: "copy", label: "Adresse",       value: "12 rue du Commerce, 75001 Paris" }
    ],

    "Service Technique": [
      { type: "tel",  label: "Technicien",    value: "0623456789" },
      { type: "mail", label: "SAV",           value: "sav@fournisseur.fr" },
      { type: "copy", label: "N° contrat",    value: "CTR-2024-00123" }
    ],

    "Administration": [
      { type: "mail", label: "Facturation",   value: "factures@fournisseur.fr" },
      { type: "copy", label: "SIRET",         value: "123 456 789 00012" },
      { type: "copy", label: "Adresse siège", value: "1 avenue de la République, 69000 Lyon" }
    ]

  }

};

/* ─────────────────────────────────────────────────────── */
/*  RENDU — ne pas modifier sauf si vous savez ce que     */
/*  vous faites.                                          */
/* ─────────────────────────────────────────────────────── */

const ICONS = { tel: "📞", mail: "✉️", copy: "📋" };
const LABELS_ACTION = { tel: "Appeler", mail: "Envoyer", copy: "Copier" };

function buildTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  Object.entries(ANNUAIRE).forEach(([l1Name, services]) => {
    const totalCoords = Object.values(services).reduce((a, c) => a + c.length, 0);

    const l1 = document.createElement('div');
    l1.className = 'level1';
    l1.innerHTML = `
      <div class="level1-header">
        <span class="arrow">▶</span>
        <span class="folder-icon">📁</span>
        <span class="title">${l1Name}</span>
        <span class="badge">${Object.keys(services).length} services</span>
      </div>
      <div class="level1-body"></div>
    `;

    const l1Header = l1.querySelector('.level1-header');
    const l1Body = l1.querySelector('.level1-body');

    l1Header.addEventListener('click', () => l1.classList.toggle('open'));

    Object.entries(services).forEach(([svcName, coords]) => {
      const l2 = document.createElement('div');
      l2.className = 'level2';
      l2.innerHTML = `
        <div class="level2-header">
          <span class="arrow">▶</span>
          <span class="folder-icon">📂</span>
          <span class="title">${svcName}</span>
        </div>
        <div class="level2-body"></div>
      `;

      const l2Header = l2.querySelector('.level2-header');
      const l2Body = l2.querySelector('.level2-body');

      l2Header.addEventListener('click', () => l2.classList.toggle('open'));

      coords.forEach(coord => {
        const el = buildCoord(coord);
        l2Body.appendChild(el);
      });

      l1Body.appendChild(l2);
    });

    tree.appendChild(l1);
  });
}

function buildCoord(coord) {
  const el = document.createElement(coord.type === 'tel' || coord.type === 'mail' ? 'a' : 'div');
  el.className = `coord ${coord.type}`;
  el.dataset.value = coord.value.toLowerCase();
  el.dataset.label = coord.label.toLowerCase();

  if (coord.type === 'tel')  el.href = `tel:${coord.value.replace(/\s/g, '')}`;
  if (coord.type === 'mail') el.href = `mailto:${coord.value}`;

  el.innerHTML = `
    <span class="coord-icon">${ICONS[coord.type]}</span>
    <span class="coord-label">${coord.label}</span>
    <span class="coord-value">${coord.value}</span>
    <span class="coord-action">${LABELS_ACTION[coord.type]}</span>
  `;

  if (coord.type === 'copy') {
    el.addEventListener('click', () => {
      navigator.clipboard.writeText(coord.value).then(() => showToast(`✅ Copié : ${coord.value}`));
    });
  }

  return el;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* Recherche */
document.getElementById('searchInput').addEventListener('input', function () {
  const q = this.value.toLowerCase().trim();
  const l1s = document.querySelectorAll('.level1');

  l1s.forEach(l1 => {
    let l1Visible = false;
    l1.querySelectorAll('.level2').forEach(l2 => {
      let l2Visible = false;
      l2.querySelectorAll('.coord').forEach(coord => {
        const match = !q || coord.dataset.value.includes(q) || coord.dataset.label.includes(q);
        coord.classList.toggle('hidden', !match);
        if (match) l2Visible = true;
      });
      l2.classList.toggle('hidden', !l2Visible);
      if (l2Visible) {
        l2.classList.add('open');
        l1Visible = true;
      }
    });
    l1.classList.toggle('hidden', !l1Visible);
    if (l1Visible) l1.classList.add('open');

    if (!q) {
      l1.classList.remove('hidden');
      l1.querySelectorAll('.level2, .coord').forEach(e => e.classList.remove('hidden'));
    }
  });
});

buildTree();
</script>
</body>
</html>
