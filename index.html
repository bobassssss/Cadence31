      background:isPendingB?"#fef3c7":bk.status==="approved"?"#dcfce7":"#fee2e2",
      color:isPendingB?"#92400e":bk.status==="approved"?"#166534":"#b91c1c",
    }},[isPendingB?"En attente":bk.status==="approved"?"Accepté ✓":"Refusé ✗"]);
    const btnsB=isPendingB?mk("div","",{style:{display:"flex",gap:"6px",marginTop:"6px"}},[
      mk("button","btn",{
        style:{flex:"1",background:"#16a34a",color:"#fff",padding:"5px"},
        onClick:async(ev)=>{
          ev.target.disabled=true;ev.target.textContent="…";
          await _sb.from("desk_bookings").update({status:"approved"}).eq("id",bk.id);
          S.deskBookings=S.deskBookings.map(x=>x.id===bk.id?{...x,status:"approved"}:x);
          const visitorName=bk.visitor_email.split("@")[0]; const note=`🏢 ${visitorName}${bk.comment?" – "+bk.comment:""}`;
          const evKey=`${bk.team}|${bk.date}`;
          const existing=S.teamEvents[evKey]||"";
          if(!existing.includes(visitorName)){
            S.teamEvents[evKey]=existing?`${existing} · ${note}`:note;
            persist();
          }
          const a=document.createElement("a");
          a.href=`mailto:${bk.visitor_email}?subject=${encodeURIComponent("[Planning] Bureau réservé ✓")}&body=${encodeURIComponent(`Bonjour,\n\nVotre réservation a été acceptée :\n• ${bk.team} · ${dateLabel}\n\nCordialement`)}`;
          a.style.display="none";document.body.appendChild(a);a.click();document.body.removeChild(a);
          render();
        }
      },["✓ Accepter"]),
      mk("button","btn danger",{
        style:{flex:"1",padding:"5px"},
        onClick:async(ev)=>{
          ev.target.disabled=true;ev.target.textContent="…";
          await _sb.from("desk_bookings").update({status:"rejected"}).eq("id",bk.id);
          S.deskBookings=S.deskBookings.map(x=>x.id===bk.id?{...x,status:"rejected"}:x);
          const a=document.createElement("a");
          a.href=`mailto:${bk.visitor_email}?subject=${encodeURIComponent("[Planning] Bureau non disponible ✗")}&body=${encodeURIComponent(`Bonjour,\n\nVotre demande n'a pas pu être acceptée :\n• ${bk.team} · ${dateLabel}\n\nCordialement`)}`;
          a.style.display="none";document.body.appendChild(a);a.click();document.body.removeChild(a);
          render();
        }
      },["✗ Refuser"]),
    ]):null;
    const card=mk("div","",{style:{
      border:"1px solid "+(isPendingB?"#fcd34d":"#e5e7eb"),borderRadius:"8px",
      padding:"10px 12px",marginBottom:"8px",background:isPendingB?"#fffbeb":"#fafafa",
    }},[
      mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},[
        mk("strong","",{style:{fontSize:"13px"}},[`🏢 ${bk.team}`]),statusEl,
      ]),
      mk("p","",{style:{margin:"3px 0 0",fontSize:"12px",color:"#374151"}},[dateLabel]),
      mk("p","",{style:{margin:"2px 0 0",fontSize:"12px",color:"#6b7280"}},[`✉ ${bk.visitor_email}`]),
      bk.comment?mk("p","",{style:{margin:"2px 0 0",fontSize:"11px",color:"#9ca3af"}},[bk.comment]):null,
      ...(btnsB?[btnsB]:[]),
    ].filter(Boolean));
    return{card,created_at:bk.created_at,isPending:isPendingB,team:bk.team};
  });

  // Remplir les cartes (après que bodyEl soit dans le DOM virtuel)
  const allCardsWithMeta=[
    ...sorted.map((req,i)=>({
      card:rows[i],
      created_at:req.created_at,
      isPending:req.status==="pending",
      type:"conge",
      filterKey:(req.member_name||"").toLowerCase(),
    })),
    ...deskCards.map(x=>({...x,type:"bureau",filterKey:(x.team||"").toLowerCase()})),
  ].sort((a,b)=>{
    if(a.isPending&&!b.isPending)return -1;
    if(!a.isPending&&b.isPending)return 1;
    return new Date(b.created_at||0)-new Date(a.created_at||0);
  });

  // Remplacer allCards par allCardsWithMeta pour applyFilters
  const allCards=allCardsWithMeta;
  applyFilters();

  return overlay;
}

// ─── MODAL PUBLICATION DES MODIFICATIONS ─────────────────────────────────────
function buildPublishModal(){
  const close=()=>{S.modal=null;render();};
  const queue=S.publishQueue||[];

  const ACTS=buildACTS();
  const actLabel=code=>code?(ACTS[code]?.l||code):"—";
  const fmtSlot=s=>s==="AM"?"Matin":"Après-midi";
  const fmtD=dateStr=>{
    const d=new Date(dateStr+"T12:00:00");
    return `${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS_FULL[d.getMonth()]}`;
  };

  // Grouper par membre
  const byMember={};
  queue.forEach(e=>{
    if(!byMember[e.mid])byMember[e.mid]=[];
    byMember[e.mid].push(e);
  });
  const memberIds=Object.keys(byMember);
  const nbMembers=memberIds.length;

  // Index courant pour l'envoi un par un
  if(S._publishIdx===undefined||S._publishIdx>=nbMembers)S._publishIdx=0;

  // Corps — liste récapitulative avec surbrillance du membre courant
  const body=mk("div","",{style:{maxHeight:"50vh",overflowY:"auto",marginBottom:"12px"}});
  memberIds.forEach((mid,i)=>{
    const member=S.members.find(m=>m.id===mid);
    if(!member)return;
    const isCurrent=i===S._publishIdx;
    const block=mk("div","",{style:{marginBottom:"10px",borderRadius:"8px",border:`1px solid ${isCurrent?"#2563eb":"#e5e7eb"}`,overflow:"hidden",opacity:isCurrent?"1":"0.5"}});
    block.appendChild(mk("div","",{style:{background:isCurrent?"#dbeafe":"#f8fafc",padding:"6px 10px",fontWeight:"600",fontSize:"12px",color:"#1e3a5f",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between"}},[
      member.name,
      isCurrent?mk("span","",{style:{fontSize:"11px",color:"#2563eb"}},["← en cours"]):"",
    ]));
    byMember[mid].sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot)).forEach(e=>{
      const row=mk("div","",{style:{display:"flex",gap:"8px",padding:"4px 10px",borderBottom:"1px solid #f3f4f6",fontSize:"12px",alignItems:"center"}});
      row.appendChild(mk("span","",{style:{minWidth:"150px",color:"#374151"}},[`${fmtD(e.date)} ${fmtSlot(e.slot)}`]));
      row.appendChild(mk("span","",{style:{color:"#9ca3af",fontSize:"11px"}},[actLabel(e.actBefore)]));
      row.appendChild(mk("span","",{style:{color:"#6b7280",padding:"0 4px"}}),[" → "]);
      row.appendChild(mk("span","",{style:{fontWeight:"600",color:"#1e3a5f"}},[actLabel(e.actAfter)]));
      block.appendChild(row);
    });
    body.appendChild(block);
  });

  const progress=mk("p","",{style:{fontSize:"12px",color:"#6b7280",margin:"0 0 12px"}},
    [`${queue.length} modification${queue.length>1?"s":""} — collaborateur ${S._publishIdx+1}/${nbMembers}`]);

  const isLast=S._publishIdx>=nbMembers-1;
  const btnSend=mk("button","btn",{
    style:{background:"#16a34a",color:"#fff",flex:"1"},
    onClick:()=>{
      const mid=memberIds[S._publishIdx];
      const member=S.members.find(m=>m.id===mid);
      if(member?.email){
        const changes=byMember[mid].sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot));
        const lines=changes.map(e=>`• ${fmtD(e.date)} ${fmtSlot(e.slot)} : ${actLabel(e.actBefore)} → ${actLabel(e.actAfter)}`).join("\n");
        const subject=encodeURIComponent("[Planning] Mise à jour de votre planning");
        const bodyText=encodeURIComponent(`Bonjour ${member.name.split(" ")[0]},\n\nVotre planning a été mis à jour :\n\n${lines}\n\nCordialement`);
        const a=document.createElement("a");
        a.href=`mailto:${member.email}?subject=${subject}&body=${bodyText}`;
        a.style.display="none";document.body.appendChild(a);a.click();document.body.removeChild(a);
      }
      S._publishIdx++;
      if(S._publishIdx>=nbMembers){S.publishQueue=[];S._publishIdx=0;close();}
      else render();
    }
  },[isLast?"📧 Envoyer et terminer":"📧 Envoyer et suivant →"]);

  const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
    mk("h3","",{style:{margin:0}},["📢 Publier les modifications"]),
    mk("button","mclose",{onClick:close},["×"]),
  ]);

  const box=mk("div","modal",{style:{maxWidth:"500px",width:"95%"}},[
    hdr,progress,body,
    mk("div","mfooter",{style:{display:"flex",gap:"8px"}},[
      mk("button","btn",{onClick:async()=>{
        const toDelete=[],toUpsert=[];
        S.publishQueue.forEach(e=>{
          if(e.actBefore===null||e.actBefore===undefined){delete S.planning[e.key];toDelete.push(e.key);}
          else{S.planning[e.key]={act:e.actBefore,comment:""};toUpsert.push({key:e.key,act:e.actBefore,comment:"",count_as:null});}
        });
        if(_sb){
          if(toDelete.length)await _sb.from("planning").delete().in("key",toDelete);
          if(toUpsert.length)await _sb.from("planning").upsert(toUpsert,{onConflict:"key"});
        }
        S.publishQueue=[];S._publishIdx=0;close();
      }},["Vider"]),
      mk("button","btn",{onClick:close},["Fermer"]),
      btnSend,
    ]),
  ]);
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[box]);
}

// ─── MODAL SAUVEGARDE / RESTAURATION ─────────────────────────────────────────
function buildBackupModal(){
  const close=()=>{S.modal=null;render();};
  const errEl=mk("p","",{style:{color:"#ef4444",fontSize:"12px",minHeight:"16px",margin:"4px 0 0"}});
  const okEl=mk("p","",{style:{color:"#16a34a",fontSize:"12px",minHeight:"16px",margin:"4px 0 0"}});

  // Mot de passe de protection
  const pwdInp=mk("input","",{type:"password",placeholder:"Mot de passe de sauvegarde",
    style:{width:"100%",padding:"8px",boxSizing:"border-box",border:"1px solid #d1d5db",borderRadius:"6px",fontSize:"13px"}});

  // ── SAUVEGARDE ──
  const btnSave=mk("button","btn primary",{
    style:{flex:"1"},
    onClick:async()=>{
      const pwd=pwdInp.value.trim();
      if(!pwd){errEl.textContent="Saisissez un mot de passe.";return;}
      // Vérifier le mot de passe stocké dans settings
      const storedPwd=S.settings.backupPwd||null;
      if(storedPwd&&pwd!==storedPwd){errEl.textContent="Mot de passe incorrect.";return;}
      // Si aucun mot de passe défini, on le définit maintenant
      if(!storedPwd){
        S.settings.backupPwd=pwd;
        persist();
      }
      btnSave.disabled=true;btnSave.textContent="Export…";errEl.textContent="";
      try{
        // Récupérer planning en paginant comme loadState
        btnSave.textContent="Export planning…";
        let planningData=[];
        let from=0;const PAGE=1000;
        while(true){
          const{data:pl}=await _sb.from("planning").select("*").range(from,from+PAGE-1);
          if(!pl||pl.length===0)break;
          planningData=planningData.concat(pl);
          if(pl.length<PAGE)break;
          from+=PAGE;
        }
        // Planning detail paginé
        btnSave.textContent="Export détail…";
        let detailData=[];
        from=0;
        while(true){
          const{data:pd}=await _sb.from("planning_detail").select("*").range(from,from+PAGE-1);
          if(!pd||pd.length===0)break;
          detailData=detailData.concat(pd);
          if(pd.length<PAGE)break;
          from+=PAGE;
        }
        const{data:requestsData}=await _sb.from("requests").select("*");
        const{data:deskData}=await _sb.from("desk_bookings").select("*");
        const backup={
          version:2,
          date:new Date().toISOString(),
          members:S.members,
          settings:S.settings,
          templates:S.templates,
          teamEvents:S.teamEvents,
          planning:planningData||[],
          planning_detail:detailData||[],
          requests:requestsData||[],
          desk_bookings:deskData||[],
        };
        const json=JSON.stringify(backup,null,2);
        const blob=new Blob([json],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        const dateStr=new Date().toISOString().slice(0,10);
        a.href=url;a.download=`cadence31_backup_${dateStr}.json`;
        a.style.display="none";document.body.appendChild(a);a.click();
        document.body.removeChild(a);URL.revokeObjectURL(url);
        okEl.textContent=`✓ Sauvegarde téléchargée (${planningData?.length||0} entrées)`;
      }catch(e){errEl.textContent="Erreur : "+e.message;}
      btnSave.disabled=false;btnSave.textContent="💾 Sauvegarder";
    }
  },["💾 Sauvegarder"]);

  // ── RESTAURATION ──
  const fileInp=document.createElement("input");
  fileInp.type="file";fileInp.accept=".json";fileInp.style.display="none";

  const btnRestore=mk("button","btn",{
    style:{flex:"1"},
    onClick:()=>{errEl.textContent="";okEl.textContent="";fileInp.click();}
  },["📂 Restaurer"]);

  fileInp.addEventListener("change",async()=>{
    const file=fileInp.files[0];if(!file)return;
    const pwd=pwdInp.value.trim();
    if(!pwd){errEl.textContent="Saisissez le mot de passe avant de restaurer.";return;}
    const storedPwd=S.settings.backupPwd||null;
    if(storedPwd&&pwd!==storedPwd){errEl.textContent="Mot de passe incorrect.";return;}
    btnRestore.disabled=true;btnRestore.textContent="Restauration…";
    try{
      const text=await file.text();
      const backup=JSON.parse(text);
      if(!backup.version||!backup.planning){errEl.textContent="Fichier de sauvegarde invalide.";return;}
      if(!confirm(`Restaurer la sauvegarde du ${backup.date?.slice(0,10)} ?\n${backup.planning.length} entrées planning, ${backup.members?.length||0} membres.\n\nCela remplacera toutes les données actuelles.`)){
        btnRestore.disabled=false;btnRestore.textContent="📂 Restaurer";return;
      }
      const chunk=200;

      // 1. Supprimer tout le planning (condition toujours vraie)
      btnRestore.textContent="Effacement…";
      await _sb.from("planning").delete().gte("key","");
      await _sb.from("planning_detail").delete().gte("date","");

      // 2. Réinsérer le planning par chunks
      btnRestore.textContent=`Restauration 0/${backup.planning.length}…`;
      const planningRows=backup.planning.map(r=>({
        key:r.key,act:r.act,comment:r.comment||"",count_as:r.count_as||null
      }));
      for(let i=0;i<planningRows.length;i+=chunk){
        btnRestore.textContent=`Restauration ${i}/${planningRows.length}…`;
        await _sb.from("planning").insert(planningRows.slice(i,i+chunk));
      }

      // 3. Planning detail
      if(backup.planning_detail?.length){
        const detailRows=backup.planning_detail.map(r=>({
          member_id:r.member_id,date:r.date,start_time:r.start_time,end_time:r.end_time,
          activity_id:r.activity_id,activity_name:r.activity_name,
          activity_code:r.activity_code,activity_color:r.activity_color
        }));
        for(let i=0;i<detailRows.length;i+=chunk)
          await _sb.from("planning_detail").insert(detailRows.slice(i,i+chunk));
      }

      // 4. Membres
      if(backup.members?.length){
        await _sb.from("members").delete().gte("id","");
        for(let i=0;i<backup.members.length;i+=chunk)
          await _sb.from("members").upsert(backup.members.slice(i,i+chunk),{onConflict:"id"});
      }

      // 5. Settings
      await _sb.from("settings").upsert([
        {key:"main",value:backup.settings||{}},
        {key:"templates",value:backup.templates||{}},
        {key:"teamEvents",value:backup.teamEvents||{}},
      ],{onConflict:"key"});

      // 6. Demandes et réservations
      if(backup.requests?.length){
        await _sb.from("requests").delete().gte("id","");
        for(let i=0;i<backup.requests.length;i+=chunk)
          await _sb.from("requests").upsert(backup.requests.slice(i,i+chunk),{onConflict:"id"});
      }
      if(backup.desk_bookings?.length){
        await _sb.from("desk_bookings").delete().gte("id","");
        for(let i=0;i<backup.desk_bookings.length;i+=chunk)
          await _sb.from("desk_bookings").upsert(backup.desk_bookings.slice(i,i+chunk),{onConflict:"id"});
      }

      // 7. État local
      S.members=backup.members||S.members;
      S.settings=backup.settings||S.settings;
      S.templates=backup.templates||S.templates;
      S.teamEvents=backup.teamEvents||S.teamEvents;
      if(backup.desk_bookings)S.deskBookings=backup.desk_bookings;
      if(backup.requests)S.requests=backup.requests;
      persist();

      // Recharger tout l'état depuis Supabase pour être sûr
      okEl.textContent="✓ Données restaurées, rechargement…";
      await loadState();
      okEl.textContent=`✓ Restauration terminée (${backup.planning.length} entrées)`;
      setTimeout(()=>{close();render();},1500);
    }catch(e){errEl.textContent="Erreur : "+e.message;}
    btnRestore.disabled=false;btnRestore.textContent="📂 Restaurer";
  });

  const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
    mk("h3","",{style:{margin:0}},["💾 Sauvegarde / Restauration"]),
    mk("button","mclose",{onClick:close},["×"]),
  ]);

  const infoEl=mk("div","info-box",{style:{marginBottom:"12px"}},
    [storedPwdMsg()]);

  function storedPwdMsg(){
    return S.settings.backupPwd
      ? "Mot de passe de sauvegarde déjà défini. Saisissez-le pour télécharger ou restaurer."
      : "Aucun mot de passe défini. Le premier mot de passe saisi sera enregistré comme mot de passe de sauvegarde.";
  }

  const btnErase=mk("button","btn danger",{
    style:{width:"100%",marginTop:"8px"},
    onClick:async()=>{
      const pwd=pwdInp.value.trim();
      if(!pwd){errEl.textContent="Saisissez le mot de passe avant d'effacer.";return;}
      const storedPwd=S.settings.backupPwd||null;
      if(storedPwd&&pwd!==storedPwd){errEl.textContent="Mot de passe incorrect.";return;}
      if(!confirm("Effacer TOUTES les données ?\n\n• Planning + détail horaire m-work\n• Membres (noms, équipes, postes, emails)\n• Paramètres (logo, sites, zones scolaires…)\n• Modèles type\n• Événements d'équipe\n• Demandes de congés\n• Réservations de bureaux\n\nCette action est irréversible sans sauvegarde."))return;
      btnErase.disabled=true;btnErase.textContent="Effacement…";errEl.textContent="";
      try{
        await _sb.from("planning").delete().neq("key","__none__");
        await _sb.from("planning_detail").delete().neq("id","00000000-0000-0000-0000-000000000000");
        await _sb.from("requests").delete().neq("id","00000000-0000-0000-0000-000000000000");
        await _sb.from("desk_bookings").delete().neq("id","00000000-0000-0000-0000-000000000000");
        await _sb.from("members").delete().neq("id","__none__");
        await _sb.from("settings").delete().in("key",["main","templates","teamEvents"]);
        // Réinitialiser l'état local
        S.planning={};S.members=[];S.templates={};S.teamEvents={};
        S.settings={schoolZone:"C",minOnSite:0,minPerDay:{},teamSettings:{},customSites:[]};
        S.planningDetail=[];S.deskBookings=[];
        okEl.textContent="✓ Toutes les données ont été effacées.";
        setTimeout(()=>{close();render();},1500);
      }catch(e){errEl.textContent="Erreur : "+e.message;}
      btnErase.disabled=false;btnErase.textContent="🗑 Effacer toutes les données";
    }
  },["🗑 Effacer toutes les données"]);

  const box=mk("div","modal",{style:{maxWidth:"380px",width:"95%"}},[
    hdr,infoEl,
    mk("div","frow",{style:{marginBottom:"12px"}},[mk("label","lf",{},["Mot de passe"]),pwdInp]),
    errEl,okEl,
    mk("div","mfooter",{style:{display:"flex",gap:"8px",marginTop:"12px"}},[
      mk("button","btn",{onClick:close},["Fermer"]),
      btnRestore,
      btnSave,
    ]),
    mk("div","",{style:{borderTop:"1px solid #f3f4f6",marginTop:"12px",paddingTop:"12px"}},[btnErase]),
    fileInp,
  ]);
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[box]);
}

// ─── MODAL DÉTAIL JOURNÉE ─────────────────────────────────────────────────────
function buildDayDetailModal(){
  const close=()=>{S.modal=null;S._detailDate=null;render();};
  const date=S._detailDate;
  if(!date){close();return mk("div");}
  const d=new Date(date+"T12:00:00");
  const dateLabel=`${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS_FULL[d.getMonth()]} ${d.getFullYear()}`;

  // Sélecteur d'équipe
  if(!S._detailTeam)S._detailTeam=getTeams()[0]||"";
  if(!S.hasOwnProperty("_detailMember"))S._detailMember="all";
  const teams=getTeams();

  const teamSel=document.createElement("select");
  teamSel.style.cssText="padding:5px 8px;font-size:12px;border:0.5px solid #d1d5db;border-radius:6px;outline:none;background:#fafafa;flex:1";
  teams.forEach(t=>{
    const o=document.createElement("option");o.value=t;o.textContent=t;
    if(t===S._detailTeam)o.selected=true;
    teamSel.appendChild(o);
  });

  const memberSel=document.createElement("select");
  memberSel.style.cssText="padding:5px 8px;font-size:12px;border:0.5px solid #d1d5db;border-radius:6px;outline:none;background:#fafafa;flex:1";

  const rebuildMemberSel=()=>{
    memberSel.innerHTML="";
    const oAll=document.createElement("option");oAll.value="all";oAll.textContent="Tous";
    memberSel.appendChild(oAll);
    S.members.filter(m=>m.team===S._detailTeam).forEach(m=>{
      const o=document.createElement("option");o.value=m.id;o.textContent=m.name;
      if(m.id===S._detailMember)o.selected=true;
      memberSel.appendChild(o);
    });
    if(S._detailMember!=="all"&&!S.members.find(m=>m.id===S._detailMember&&m.team===S._detailTeam)){
      memberSel.value="all";S._detailMember="all";
    }
  };

  teamSel.addEventListener("change",()=>{S._detailTeam=teamSel.value;S._detailMember="all";rebuildMemberSel();rebuildContent();});
  memberSel.addEventListener("change",()=>{S._detailMember=memberSel.value;rebuildContent();});

  const filtersRow=mk("div","",{style:{display:"flex",gap:"8px",marginBottom:"12px"}});
  filtersRow.appendChild(teamSel);filtersRow.appendChild(memberSel);
  rebuildMemberSel();

  // Couleur hex sans alpha
  const hexColor=(c)=>{
    if(!c)return"#e5e7eb";
    const h=c.replace(/33$/,"").replace(/^#/,"");
    return"#"+h;
  };

  // Conteneur des lignes membres
  const content=document.createElement("div");
  content.style.cssText="max-height:65vh;overflow-y:auto";

  function rebuildContent(){
    content.innerHTML="";
    const members=S.members.filter(m=>
      m.team===S._detailTeam&&
      (S._detailMember==="all"||m.id===S._detailMember)
    );
    if(members.length===0){
      content.appendChild(mk("p","",{style:{color:"#6b7280",fontStyle:"italic",padding:"12px 0"}},["Aucun membre dans cette équipe."]));
      return;
    }

    let hasAny=false;
    members.forEach(m=>{
      const acts=(S.planningDetail||[]).filter(r=>r.member_id===m.id&&r.date===date)
        .sort((a,b)=>a.start_time.localeCompare(b.start_time));
      if(acts.length===0)return;
      hasAny=true;

      const memberBlock=mk("div","",{style:{marginBottom:"12px",borderRadius:"8px",border:"1px solid #e5e7eb",overflow:"hidden"}});

      // En-tête membre
      const hdrM=mk("div","",{style:{background:"#f8fafc",padding:"6px 10px",fontWeight:"600",fontSize:"12px",color:"#1e3a5f",borderBottom:"1px solid #e5e7eb"}},[m.name]);
      memberBlock.appendChild(hdrM);

      // Créneaux
      acts.forEach(a=>{
        const color=hexColor(a.activity_color);
        const row=mk("div","",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"5px 10px",borderBottom:"1px solid #f3f4f6"}});

        // Barre colorée
        const bar=mk("div","",{style:{width:"4px",height:"28px",borderRadius:"2px",background:color,flexShrink:"0"}});

        // Heure
        const time=mk("div","",{style:{fontSize:"11px",color:"#6b7280",minWidth:"96px",fontVariantNumeric:"tabular-nums"}},[
          `${a.start_time} → ${a.end_time}`
        ]);

        // Activité
        const actEl=mk("div","",{style:{fontSize:"12px",color:"#374151",flex:"1"}},[
          mk("span","",{style:{
            display:"inline-block",padding:"1px 6px",borderRadius:"4px",fontSize:"11px",fontWeight:"600",
            background:color+"33",color:color,marginRight:"5px"
          }},[a.activity_code||"?"]),
          a.activity_name||"",
        ]);

        row.appendChild(bar);row.appendChild(time);row.appendChild(actEl);
        memberBlock.appendChild(row);
      });

      content.appendChild(memberBlock);
    });

    if(!hasAny){
      content.appendChild(mk("p","",{style:{color:"#6b7280",fontStyle:"italic",padding:"12px 0"}},
        ["Aucun détail disponible pour cette équipe ce jour — lancez un import m-work."]));
    }
  }

  rebuildContent();

  const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},[
    mk("h3","",{style:{margin:0,fontSize:"14px"}},[`📅 ${dateLabel}`]),
    mk("button","mclose",{onClick:close},["×"]),
  ]);

  const box=mk("div","modal",{style:{maxWidth:"460px",width:"95%"}},[hdr,filtersRow,content]);
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[box]);
}

// ─── CALCUL BUREAUX DISPONIBLES ───────────────────────────────────────────────
const MANAGER_POSTS=["DDGA","DA","DAP","AdjP"];

function calcDeskAvailability(team,d,slot){
  const ts=S.settings.teamSettings?.[team]||{};
  const bureauxFixes=ts.bureauxFixes;
  if(bureauxFixes==null)return null; // pas configuré

  const dateStr=fmtDate(d);
  const teams=getTeams();
  const teamIdx=teams.indexOf(team);
  const an=`A${teamIdx+1}`;

  // Membres de l'équipe
  const members=S.members.filter(m=>m.team===team);

  // Présents sur site (même logique que teamCoverage)
  let presents=0;
  let hasAccueil=false;
  let managersPresents=0;

  members.forEach(m=>{
    const entry=getEntry(m.id,d,slot);
    const act=getAct(m.id,d,slot);
    const ct=getEffectiveCountTeam(m.id,act,entry);
    if(ct!==team)return; // pas compté dans cette équipe

    presents++;

    // Accueil : libère son bureau (il est dans le hall)
    if(act===an||act==="S")hasAccueil=true;

    // Manager en open space : a son propre bureau fermé
    if(ts.openSpace&&MANAGER_POSTS.includes(posteAbbr(m.post||"")))managersPresents++;
  });

  // Réservations en attente ou acceptées décomptées
  const bookedCount=S.deskBookings.filter(b=>
    b.team===team&&b.date===dateStr&&b.slot===slot&&
    (b.status==="pending"||b.status==="approved")
  ).length;

  const libres=bureauxFixes - presents + (hasAccueil?1:0) + managersPresents - bookedCount;
  return Math.max(0,libres);
}

// ─── VUE VISITEUR ─────────────────────────────────────────────────────────────
function buildVisitorView(){
  const today=new Date();
  if(!S._visitorWeek)S._visitorWeek=getMonday(today);
  const weekStart=S._visitorWeek;
  const todayStr=fmtDate(today);

  // Jours de la semaine Mar→Sam
  const workDays=WORK_OFFSETS.map(off=>{
    const d=addDays(weekStart,off);
    return{d,slots:getDaySlots(d)};
  }).filter(({d})=>!isHoliday(d));

  const app=document.getElementById("app");

  // Topbar visiteur
  const tue=addDays(weekStart,1),sat=addDays(weekStart,5);
  const lbl=`${tue.getDate()} ${MONTHS_SHORT[tue.getMonth()]} – ${sat.getDate()} ${MONTHS_SHORT[sat.getMonth()]}`;
  const topbar=mk("div","topbar",{},[
    mk("div","topbar-row",{},[
      mk("span","logo",{},["Bureaux disponibles"]),
      mk("div","nav-week",{},[
        mk("button","btn",{onClick:()=>{S._visitorWeek=addDays(weekStart,-7);render();}},["←"]),
        mk("span","wlabel",{style:{cursor:"pointer"},onClick:()=>{
          // navPicker : on redirige le résultat vers _visitorWeek
          S._navPickerTarget="visitor";
          S.modal="navPicker";render();
        }},[lbl]),
        mk("button","btn",{onClick:()=>{S._visitorWeek=addDays(weekStart,7);render();}},["→"]),
        mk("button","btn today",{onClick:()=>{S._visitorWeek=getMonday(today);render();}},["Auj."]),
      ]),
      ...(S.undoStack.length>0?[mk("button","btn",{style:{padding:"6px 9px"},onClick:async()=>{await undoLast();}},["↩ Annuler"])]:[] ),
    mk("button","btn",{style:{marginLeft:"auto",padding:"6px 10px",fontSize:"16px"},title:"Quitter",onClick:logout},["🚪"]),
    ]),
  ]);
  app.appendChild(topbar);

  // Tableau par équipe
  const teams=getTeams();
  const wrap=mk("div","",{style:{overflowX:"auto",padding:"8px"}});

  teams.forEach(team=>{
    const ts=S.settings.teamSettings?.[team]||{};
    const bureauxFixes=ts.bureauxFixes??0;

    const card=mk("div","",{style:{marginBottom:"16px",borderRadius:"10px",border:"1px solid #e5e7eb",overflow:"hidden"}});

    const hdr=mk("div","",{style:{background:"#1e3a5f",color:"#fff",padding:"8px 12px",fontWeight:"600",fontSize:"13px"}},[
      team,
      mk("span","",{style:{fontSize:"10px",fontWeight:"normal",marginLeft:"8px",opacity:"0.8"}},[
        `${bureauxFixes} bureau${bureauxFixes>1?"x":""} fermé${bureauxFixes>1?"s":""}${ts.openSpace?" + open space":""}`
      ]),
    ]);
    card.appendChild(hdr);

    const table=document.createElement("table");
    table.style.cssText="width:100%;border-collapse:collapse;font-size:12px";

    const thead=table.createTHead();
    const r1=thead.insertRow();
    r1.appendChild(mk("th","",{style:{width:"60px",padding:"4px 6px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}},[""]));
    workDays.forEach(({d,slots})=>{
      const isToday=fmtDate(d)===todayStr;
      const th=mk("th","",{style:{
        padding:"4px",textAlign:"center",
        background:isToday?"#dbeafe":"#f9fafb",
        borderBottom:"1px solid #e5e7eb",
      }},[`${DAYS_FULL[d.getDay()].slice(0,3)} ${d.getDate()}`]);
      th.colSpan=slots.length;
      r1.appendChild(th);
    });

    const r2=thead.insertRow();
    r2.appendChild(mk("th","",{style:{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}},[""]));
    workDays.forEach(({slots})=>slots.forEach(slot=>{
      r2.appendChild(mk("th","",{style:{padding:"3px",textAlign:"center",fontSize:"10px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}},[slot==="AM"?"M":"A"]));
    }));

    const tbody=table.createTBody();

    // Ligne disponibilités
    const tr=tbody.insertRow();
    tr.appendChild(mk("td","",{style:{padding:"4px 6px",fontSize:"11px",color:"#6b7280",fontStyle:"italic"}},["Libres"]));
    workDays.forEach(({d,slots})=>slots.forEach(slot=>{
      const avail=calcDeskAvailability(team,d,slot);
      const dateStr=fmtDate(d);
      const isPast=d<new Date(new Date().setHours(0,0,0,0));
      const td=document.createElement("td");
      td.style.cssText="text-align:center;padding:4px;font-weight:700;font-size:14px";
      if(avail===null){
        td.textContent="—";td.style.color="#d1d5db";
      } else if(avail===0||isPast){
        td.textContent=avail===null?"—":String(avail);
        td.style.background="#fee2e2";td.style.color="#b91c1c";
      } else if(avail===1){
        td.textContent="1";td.style.background="#fef3c7";td.style.color="#92400e";
        td.style.cursor="pointer";
        td.addEventListener("click",()=>buildDeskBookingModal(team,d,slot,avail));
      } else {
        td.textContent=String(avail);td.style.background="#dcfce7";td.style.color="#166534";
        td.style.cursor="pointer";
        td.addEventListener("click",()=>buildDeskBookingModal(team,d,slot,avail));
      }
      tr.appendChild(td);
    }));

    // Ligne demandes en cours (toujours affichée)
    const tr2=tbody.insertRow();
    tr2.appendChild(mk("td","",{style:{padding:"4px 6px",fontSize:"11px",color:"#92400e",fontStyle:"italic"}},["En attente"]));
    workDays.forEach(({d,slots})=>slots.forEach(slot=>{
      const dateStr=fmtDate(d);
      const count=S.deskBookings.filter(b=>b.team===team&&b.date===dateStr&&b.slot===slot&&b.status==="pending").length;
      const td2=document.createElement("td");
      td2.style.cssText="text-align:center;padding:4px;font-size:12px";
      if(count>0){
        td2.textContent=String(count);
        td2.style.background="#fef9c3";td2.style.color="#92400e";td2.style.fontWeight="600";
      } else {
        td2.textContent="—";td2.style.color="#e5e7eb";
      }
      tr2.appendChild(td2);
    }));

    card.appendChild(table);
    wrap.appendChild(card);
  });

  app.appendChild(wrap);
  app.appendChild(mk("p","hint",{},["Cliquez sur un créneau vert ou orange pour demander un bureau."]));
}

// ─── MODAL RÉSERVATION BUREAU (visiteur) ──────────────────────────────────────
function buildDeskBookingModal(team,d,slot,avail){
  const dateStr=fmtDate(d);
  const slotLbl=slot==="AM"?"Matin":"Après-midi";
  const dayLbl=`${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;

  const emailInp=mk("input","",{type:"email",placeholder:"votre@email.fr",style:{width:"100%",marginBottom:"8px"}});
  const commentInp=mk("input","",{type:"text",placeholder:"Motif (optionnel)",style:{width:"100%"}});
  const errEl=mk("p","",{style:{color:"#ef4444",fontSize:"12px",minHeight:"16px",margin:"4px 0 0"}});

  const overlay=document.createElement("div");overlay.className="overlay";
  const close=()=>overlay.remove();

  const btnSend=mk("button","btn",{
    style:{background:"#2563eb",color:"#fff",flex:"1"},
    onClick:async()=>{
      const email=emailInp.value.trim();
      if(!email||!email.includes("@")){errEl.textContent="Email invalide";return;}
      btnSend.disabled=true;btnSend.textContent="Envoi…";
      try{
        const{data,error}=await _sb.from("desk_bookings").insert({
          team,date:dateStr,slot,
          visitor_email:email,
          comment:commentInp.value.trim(),
          status:"pending",
        }).select().single();
        if(error)throw error;
        S.deskBookings=[data,...S.deskBookings];
        // Même système que les congés — ouvre l'app mail
        const dateLabel=`${dayLbl} — ${slotLbl}`;
        const subject=encodeURIComponent(`[Planning] Demande bureau — ${team}`);
        const mailBody=encodeURIComponent(`Bonjour,\n\nDemande de réservation de bureau :\n• Équipe : ${team}\n• Date : ${dateLabel}\n• Email visiteur : ${email}\n• Motif : ${commentInp.value.trim()||"—"}\n\nConnectez-vous pour valider.\nhttps://cadence31.vercel.app`);
        window.location.href=`mailto:${_ADM}?from=${encodeURIComponent(email)}&subject=${subject}&body=${mailBody}`;
        close();
        render();
      }catch(e){
        errEl.textContent="Erreur : "+e.message;
        btnSend.disabled=false;btnSend.textContent="Envoyer";
      }
    }
  },["Envoyer la demande"]);

  const box=mk("div","modal",{style:{maxWidth:"340px"}});
  box.appendChild(mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
    mk("h3","",{style:{margin:0}},["📋 Réserver un bureau"]),
    mk("button","mclose",{onClick:close},["×"]),
  ]));
  box.appendChild(mk("p","",{style:{fontSize:"13px",color:"#374151",margin:"0 0 12px"}},[
    `${team} — ${dayLbl} ${slotLbl}`,
    mk("br"),
    mk("span","",{style:{fontSize:"11px",color:"#6b7280"}},[`${avail} bureau${avail>1?"x":""} disponible${avail>1?"s":""}`]),
  ]));
  box.appendChild(mk("div","frow",{style:{marginBottom:"8px"}},[mk("label","lf",{},["Votre email"]),emailInp]));
  box.appendChild(mk("div","frow",{},[mk("label","lf",{},["Motif"]),commentInp]));
  box.appendChild(errEl);
  box.appendChild(mk("div","mfooter",{style:{marginTop:"12px",display:"flex",gap:"8px"}},[
    mk("button","btn",{onClick:close},["Annuler"]),
    btnSend,
  ]));
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)close();});
  document.getElementById("app").appendChild(overlay);
}
