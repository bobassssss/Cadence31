  body.push(mk("div","mfooter",{},[mk("button","btn danger",{onClick:resetDef},["↺ Défaut (présent)"]),mk("button","btn",{onClick:close},["Fermer"])]));
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[mk("div","modal",{},[...body])]);
}

// ─── MODÈLES : APPLIQUER SUR PÉRIODE ─────────────────────────────────────────
function buildTplApplyModal(){
  const name=S.editingTplName;
  const close=()=>{S.modal="tplList";S.editingTplName=null;render();};
  const closeToEditor=()=>{S.modal="tplEditor";render();};
  if(!name||!S.templates[name]){close();return mk("div");}

  const mon=getMonday(new Date());
  const startInp=mk("input","",{type:"date"});startInp.value=fmtDate(addDays(mon,1));
  const endInp=mk("input","",{type:"date"});endInp.value=fmtDate(addDays(mon,55));// ~8 semaines par défaut

  const applyTpl=()=>{
    const tpl=S.templates[name].weeks||S.templates[name];
    const s=new Date(startInp.value),e=new Date(endInp.value);
    if(isNaN(s)||isNaN(e)||s>e){alert("Dates invalides.");return;}
    let cur=getMonday(s);let applied=0;
    while(cur<=e){
      const cw=getCycleWeek(cur);
      S.members.forEach(m=>{
        const slots=tpl[m.id]||{};
        WORK_OFFSETS.forEach(off=>{
          const d=addDays(cur,off);if(d>e)return;
          getDaySlots(d).forEach(slot=>{
            const planKey=m.id+"|"+fmtDate(d)+"|"+slot;
            // Ne pas écraser une case déjà renseignée
            if(S.planning[planKey])return;
            const slotKey=`w${cw}_d${off}_${slot}`;
            const act=slots[slotKey];
            const def=defaultAct(m.id,d,slot);
            if(act&&act!==def){S.planning[planKey]={act,comment:""};applied++;}
          });
        });
      });
      cur=addDays(cur,7);
    }
    persist();
    const nbWeeks=Math.ceil((e-s)/(7*86400000));
    alert(`Modèle "${name}" appliqué sur ${nbWeeks} semaine${nbWeeks>1?"s":""} (${applied} case${applied>1?"s":""} renseignée${applied>1?"s":""}).`);
    S.modal=null;S.editingTplName=null;render();
  };

  const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}},[
    mk("h3",{},["Appliquer le modèle"]),mk("button","mclose",{onClick:close},["×"]),
  ]);
  const bodyEls=[
    hdr,
    mk("div","info-box",{style:{marginBottom:"12px"}},[`Modèle : ${name} · Le cycle Sem.1 / Sem.2 s'aligne automatiquement sur les semaines paires/impaires.`]),
    mk("div","",{style:{display:"flex",gap:"8px",marginBottom:"12px"}},[
      mk("div","",{style:{flex:"1"}},[mk("label","lf",{},["Du"]),startInp]),
      mk("div","",{style:{flex:"1"}},[mk("label","lf",{},["Au"]),endInp]),
    ]),
    mk("button","btn primary",{onClick:applyTpl,style:{width:"100%",padding:"10px",fontSize:"13px",marginBottom:"8px"}},["▶ Appliquer sur cette période"]),
    mk("button","btn",{onClick:close,style:{width:"100%",padding:"8px"}},["Annuler"]),
  ];
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[mk("div","modal",{},[...bodyEls])]);
}

// ─── MODAL NAVIGATION CALENDRIER ─────────────────────────────────────────────
function buildNavPickerModal(){
  const close=()=>{S.modal=null;render();};
  const isWeek=S.view==="week";
  const today=new Date();
  // Show 6 months around current
  const refMonth=isWeek?new Date(S.weekStart.getFullYear(),S.weekStart.getMonth(),1):new Date(S.monthRef.getFullYear(),S.monthRef.getMonth(),1);
  let dispYear=refMonth.getFullYear();
  let dispMonth=refMonth.getMonth();

  function isoWeek(d){
    const thu=new Date(d);thu.setDate(d.getDate()-(d.getDay()||7)+4);
    const jan1=new Date(thu.getFullYear(),0,1);
    return Math.ceil(((thu-jan1)/86400000+1)/7);
  }

  const container=mk("div","modal",{style:{maxWidth:"340px",padding:"14px"}});
  function rebuildPicker(){
    container.innerHTML="";
    const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
      mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{dispMonth--;if(dispMonth<0){dispMonth=11;dispYear--;}rebuildPicker();}},"←"),
      mk("span","",{style:{fontWeight:"600",fontSize:"13px",color:"#1e3a5f"}},[MONTHS_FULL[dispMonth]+" "+dispYear]),
      mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{dispMonth++;if(dispMonth>11){dispMonth=0;dispYear++;}rebuildPicker();}},["→"]),
      mk("button","mclose",{onClick:close},["×"]),
    ]);
    container.appendChild(hdr);

    if(isWeek){
      // Vue semaine : afficher les semaines avec numéros
      container.appendChild(mk("p","",{style:{fontSize:"10px",color:"#94a3b8",marginBottom:"6px"}},["Cliquez sur une semaine pour y aller"]));
      const grid=mk("div","",{style:{display:"grid",gridTemplateColumns:"repeat(1,1fr)",gap:"3px"}});
      // Find Mondays in this month
      const mondays=[];
      let d=new Date(dispYear,dispMonth,1);
      // Go back to start of week containing 1st
      while(d.getDay()!==1)d=addDays(d,-1);
      while(d.getMonth()===dispMonth||(d<=new Date(dispYear,dispMonth+1,0))){
        mondays.push(new Date(d));
        d=addDays(d,7);
        if(d.getMonth()>dispMonth&&d.getFullYear()>=dispYear)break;
      }
      mondays.forEach(mon=>{
        const tue=addDays(mon,1),sat=addDays(mon,5);
        const wn=isoWeek(mon);
        const activeWeek=S._navPickerTarget==="visitor"?S._visitorWeek:S.weekStart;
        const isActive=fmtDate(mon)===fmtDate(activeWeek);
        const btn=mk("div","",{
          style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 9px",borderRadius:"6px",cursor:"pointer",
                 background:isActive?"#1e3a5f":"#f8fafc",color:isActive?"#fff":"#374151",
                 border:"0.5px solid "+(isActive?"transparent":"#e2e8f0"),fontSize:"12px"},
          onClick:()=>{
            if(S._navPickerTarget==="visitor"){S._visitorWeek=mon;}
            else{S.weekStart=mon;}
            S._navPickerTarget=null;S.modal=null;render();
          }
        });
        btn.innerHTML=`<span style="font-size:10px;color:${isActive?"rgba(255,255,255,.6)":"#94a3b8"};min-width:24px">S${wn}</span>`+
          `<span>${DAYS_FULL[2]} ${tue.getDate()} – ${DAYS_FULL[6]} ${sat.getDate()} ${MONTHS_SHORT[sat.getMonth()]}</span>`;
        grid.appendChild(btn);
      });
      container.appendChild(grid);
    } else {
      // Vue mois : grille des mois de l'année
      container.appendChild(mk("p","",{style:{fontSize:"10px",color:"#94a3b8",marginBottom:"6px"}},["Cliquez sur un mois pour y aller"]));
      const grid=mk("div","",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px"}});
      MONTHS_SHORT.forEach((ms,mi)=>{
        const isActive=mi===S.monthRef.getMonth()&&dispYear===S.monthRef.getFullYear();
        const btn=mk("div","",{
          style:{padding:"7px 4px",borderRadius:"6px",textAlign:"center",cursor:"pointer",fontSize:"12px",
                 background:isActive?"#1e3a5f":"#f8fafc",color:isActive?"#fff":"#374151",
                 border:"0.5px solid "+(isActive?"transparent":"#e2e8f0")},
          onClick:()=>{S.monthRef=new Date(dispYear,mi,1);S.modal=null;render();}
        },[MONTHS_FULL[mi].slice(0,4)]);
        grid.appendChild(btn);
      });
      container.appendChild(grid);
      // Year navigation
      const yNav=mk("div","",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",marginTop:"10px"}});
      yNav.appendChild(mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{dispYear--;rebuildPicker();}},["◀ "+( dispYear-1)]));
      yNav.appendChild(mk("span","",{style:{fontWeight:"600",color:"#1e3a5f"}},[String(dispYear)]));
      yNav.appendChild(mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{dispYear++;rebuildPicker();}},[(dispYear+1)+" ▶"]));
      container.appendChild(yNav);
    }
  }
  rebuildPicker();
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[container]);
}

        mk("button","btn",{onClick:close},["Annuler"]),
        mk("button","btn primary",{onClick:doSave},["Enregistrer"]),

  ]);
}

// ─── MODAL TABLEAU DE BORD CRC ────────────────────────────────────────────────
function buildCRCDashboard(){
  const close=()=>{S.modal=null;render();};
  const today=new Date();
  let displayYear=today.getFullYear();

  function isoWeek(d){
    const thu=new Date(d);thu.setDate(d.getDate()-(d.getDay()||7)+4);
    const jan1=new Date(thu.getFullYear(),0,1);
    return{y:thu.getFullYear(),w:Math.ceil(((thu-jan1)/86400000+1)/7)};
  }

  // Initiales d'un nom : premières lettres de chaque mot (max 3)
  function initials(name){
    return name.trim().split(/\s+/).map(w=>w[0]?.toUpperCase()||"").slice(0,3).join("");
  }

  // Construire les 52 (ou 53) semaines de l'année civile
  function buildYearWeeks(year){
    // Semaines dont le jeudi tombe dans l'année (ISO)
    const jan1=new Date(year,0,1);
    const dec31=new Date(year,11,31);
    const weeks=[];
    const seen=new Set();
    // Partir du 1er lundi avant le 1er jan
    let cur=getMonday(jan1);
    while(cur<=addDays(dec31,6)){
      const key=fmtDate(cur);
      if(!seen.has(key)){
        seen.add(key);
        const {y,w}=isoWeek(cur);
        // Garder uniquement les semaines ISO de l'année demandée
        if(y===year){
          const tue=addDays(cur,1);
          // Membres ayant CRC cette semaine
          const crcInitials=[];
          const crcMemberIds=[];
          S.members.forEach(m=>{
            let found=false;
            WORK_OFFSETS.forEach(off=>{
              if(found)return;
              const d=addDays(cur,off);
              getDaySlots(d).forEach(slot=>{
                if(!found&&getAct(m.id,d,slot)==="CRC"){found=true;}
              });
            });
            if(found){crcInitials.push(initials(m.name));crcMemberIds.push(m.id);}
          });
    weeks.push({mon:new Date(cur),key,w,tue,crcInitials,hasCRC:crcInitials.length>0,
      // Track member IDs for accurate per-member count
      crcMemberIds,
      // School vacation: at least one work day in the week falls in school vacation
      isVac: WORK_OFFSETS.some(off=>isSchoolVac(addDays(cur,off))),
    });
        }
      }
      cur=addDays(cur,7);
    }
    return weeks;
  }

  const container=document.createElement("div");container.className="modal";
  container.style.maxWidth="640px";container.style.maxHeight="90vh";container.style.overflowY="auto";

  function rebuild(){
    container.innerHTML="";

    const weeks=buildYearWeeks(displayYear);
    const totalCRCWeeks=weeks.filter(w=>w.hasCRC).length;
    const currentWeekMon=fmtDate(getMonday(today));

    // Header
    const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
      mk("h3",{},["Tableau de bord CRC"]),mk("button","mclose",{onClick:close},["×"]),
    ]);
    container.appendChild(hdr);

    // Sélecteur d'année
    const yearNav=mk("div","",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}});
    yearNav.appendChild(mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{displayYear--;rebuild();}},[String(displayYear-1)+" ◀"]));
    yearNav.appendChild(mk("span","",{style:{fontWeight:"700",fontSize:"14px",color:"#1e3a5f"}},[String(displayYear)]));
    yearNav.appendChild(mk("button","btn",{style:{padding:"4px 10px"},onClick:()=>{displayYear++;rebuild();}},["▶ "+String(displayYear+1)]));
    yearNav.appendChild(mk("span","",{style:{fontSize:"12px",color:"#6b7280"}},[`${totalCRCWeeks} semaine${totalCRCWeeks>1?"s":""} avec CRC / ${weeks.length}`]));
    container.appendChild(yearNav);

    // Grille : 4 trimestres × 13 semaines
    // Organiser les semaines par trimestre (S1-S13, S14-S26, S27-S39, S40-S52/53)
    const quarters=[[],[],[],[]];
    weeks.forEach(wk=>{
      const q=Math.min(3,Math.floor((wk.w-1)/13));
      quarters[q].push(wk);
    });

    const calWrap=mk("div","",{style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"12px"}});
    const quarterLabels=["T1 (jan–mar)","T2 (avr–jun)","T3 (jul–sep)","T4 (oct–déc)"];
    quarters.forEach((qWeeks,qi)=>{
      if(qWeeks.length===0)return;
      const qDiv=mk("div","");
      qDiv.appendChild(mk("p","",{style:{fontSize:"10px",fontWeight:"600",color:"#94a3b8",marginBottom:"4px"}},[quarterLabels[qi]]));
      const row=mk("div","crc-cal",{style:{flexWrap:"wrap",gap:"3px"}});
      qWeeks.forEach(wk=>{
        const isCurrent=wk.key===currentWeekMon;
        const cell=document.createElement("div");
        cell.className="crc-week"+(wk.hasCRC?" has-crc":"")+(wk.isVac?" vac-week":"");
        cell.style.minWidth="42px";cell.style.padding="3px 4px";
        if(isCurrent){cell.style.outline="2px solid #1e3a5f";cell.style.outlineOffset="1px";}

        const wnSpan=document.createElement("span");wnSpan.className="wn";wnSpan.textContent="S"+wk.w;
        cell.appendChild(wnSpan);

        const dateSpan=document.createElement("span");
        dateSpan.style.cssText="display:block;font-size:9px;line-height:1.2";
        dateSpan.textContent=wk.tue.getDate()+"/"+(wk.tue.getMonth()+1);
        cell.appendChild(dateSpan);

        if(wk.hasCRC&&wk.crcInitials.length>0){
          const initsDiv=document.createElement("div");
          initsDiv.style.cssText="margin-top:2px;display:flex;flex-wrap:wrap;gap:1px;justify-content:center";
          wk.crcInitials.forEach(ini=>{
            const s=document.createElement("span");
            s.style.cssText="font-size:7.5px;font-weight:700;background:#1e3a5f;color:#fff;border-radius:3px;padding:0 2px;line-height:1.5";
            s.textContent=ini;initsDiv.appendChild(s);
          });
          cell.appendChild(initsDiv);
          cell.title=wk.crcInitials.join(", ")+(wk.isVac?" · Vacances scolaires":"");
        } else if(wk.isVac){
          cell.title="Vacances scolaires";
        }

        row.appendChild(cell);
      });
      qDiv.appendChild(row);
      calWrap.appendChild(qDiv);
    });
    container.appendChild(calWrap);

    // Légende
    container.appendChild(mk("div","",{style:{display:"flex",gap:"10px",marginBottom:"12px",fontSize:"11px",color:"#6b7280",flexWrap:"wrap"}},[
      mk("span","",{style:{display:"flex",alignItems:"center",gap:"5px"}},[
        mk("span","",{style:{width:"14px",height:"14px",borderRadius:"3px",background:"#dbeafe",border:"1px solid #93c5fd",display:"inline-block"}}),
        "CRC"
      ]),
      mk("span","",{style:{display:"flex",alignItems:"center",gap:"5px"}},[
        mk("span","",{style:{width:"14px",height:"14px",borderRadius:"3px",background:"#f3f4f6",border:"1px solid #e5e7eb",display:"inline-block"}}),
        "Vacances scolaires"
      ]),
      mk("span","",{style:{display:"flex",alignItems:"center",gap:"5px"}},[
        mk("span","",{style:{width:"14px",height:"14px",borderRadius:"3px",background:"#f8fafc",border:"2px solid #1e3a5f",display:"inline-block"}}),
        "Semaine actuelle"
      ]),
    ]));

    // Par membre
    container.appendChild(mk("p","grp-label",{},["Par collaborateur"]));
    getTeams().forEach(team=>{
      container.appendChild(mk("p","",{style:{fontSize:"10px",fontWeight:"600",color:"#1e3a5f",margin:"6px 0 3px"}},[team]));
      S.members.filter(m=>m.team===team).forEach(m=>{
        const crcWks=weeks.filter(wk=>wk.crcMemberIds.includes(m.id)).length;
        const row=mk("div","crc-member-row");
        row.appendChild(mk("span","",{style:{fontSize:"12px"}},[m.name]));
        const badge=mk("span","crc-badge",{},[crcWks+" sem."]);
        if(crcWks===0){badge.style.background="#f1f5f9";badge.style.color="#94a3b8";}
        row.appendChild(badge);
        container.appendChild(row);
      });
    });

    container.appendChild(mk("div","mfooter",{},[
      ...(S.actCells&&S.actCells.length>0?[mk("button","btn danger",{onClick:()=>{
        S.actCells.forEach(k=>{delete S.planning[k];_deleteKey(k);});
        persist();S.modal=null;S.actCells=[];render();
      }},["↺ Supprimer le CRC"])]:[] ),
      mk("button","btn",{onClick:()=>{S.modal="stats";render();}},["📊 Statistiques"]),
      mk("button","btn primary",{onClick:close},["Fermer"]),
    ]));
  }

  rebuild();
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[container]);
}

// ─── MODAL EFFACER DONNÉES ────────────────────────────────────────────────────
function buildClearModal(){
  const close=()=>{S.modal=null;render();};

  // Période : par défaut semaine courante
  const tue=addDays(S.weekStart,1),sat=addDays(S.weekStart,5);
  let clearStart=fmtDate(tue),clearEnd=fmtDate(sat);

  // Cible : "all" ou un mid
  let clearTarget="all";

  const hdr=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}},[
    mk("h3",{},["✕ Effacer des activités"]),
    mk("button","mclose",{onClick:close},["×"]),
  ]);

  // ── Période
  const startInp=mk("input","",{type:"date"});startInp.value=clearStart;
  startInp.addEventListener("change",()=>{clearStart=startInp.value;});
  const endInp=mk("input","",{type:"date"});endInp.value=clearEnd;
  endInp.addEventListener("change",()=>{clearEnd=endInp.value;});

  // Boutons rapides
  const mon=getMonday(new Date());
  const mkQ=(lbl,s,e)=>{
    const btn=mk("button","btn",{style:{fontSize:"11px",padding:"4px 8px"},onClick:()=>{
      startInp.value=clearStart=s;endInp.value=clearEnd=e;
    }},[lbl]);
    return btn;
  };
  const today=new Date();const y=today.getFullYear(),mo=today.getMonth();
  const qWrap=mk("div","",{style:{display:"flex",gap:"5px",flexWrap:"wrap",margin:"6px 0 12px"}});
  qWrap.appendChild(mkQ("Cette semaine",fmtDate(addDays(mon,1)),fmtDate(addDays(mon,5))));
  qWrap.appendChild(mkQ("Ce mois",fmtDate(new Date(y,mo,1)),fmtDate(new Date(y,mo+1,0))));
  qWrap.appendChild(mkQ("Année "+y,fmtDate(new Date(y,0,1)),fmtDate(new Date(y,11,31))));

  // ── Cible
  const targetSel=document.createElement("select");
  targetSel.style.cssText="width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #d1d5db;border-radius:8px;outline:none;background:#fafafa;margin-bottom:14px";
  const oAll=document.createElement("option");oAll.value="all";oAll.textContent="Tous les collaborateurs";
  targetSel.appendChild(oAll);
  getTeams().forEach(team=>{
    const oTeam=document.createElement("option");oTeam.value="team:"+team;oTeam.textContent="── "+team+" (toute l\'équipe)";oTeam.disabled=true;oTeam.style.color="#94a3b8";
    targetSel.appendChild(oTeam);
    S.members.filter(m=>m.team===team).forEach(member=>{
      const o=document.createElement("option");o.value=member.id;o.textContent="   "+member.name;targetSel.appendChild(o);
    });
  });
  targetSel.addEventListener("change",()=>{clearTarget=targetSel.value;});

  // ── Zone de confirmation
  const confirmBox=mk("div","",{style:{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:"8px",padding:"12px",marginBottom:"14px",fontSize:"12px",color:"#991b1b",lineHeight:"1.6"}});
  confirmBox.textContent="Cette action supprime définitivement toutes les activités saisies sur la période choisie. Les activités par défaut (présent, repos…) ne sont pas affectées.";

  // ── Bouton confirmer
  const doConfirm=()=>{
    const s=new Date(clearStart+"T00:00:00");
    const e=new Date(clearEnd+"T23:59:59");
    if(isNaN(s)||isNaN(e)||s>e){alert("Dates invalides.");return;}

    const midsToDelete=clearTarget==="all"
      ? S.members.map(m=>m.id)
      : [clearTarget];

    let count=0;
    Object.keys(S.planning).forEach(k=>{
      const parts=k.split("|");
      const mid=parts[0],d=new Date(parts[1]+"T00:00:00");
      if(midsToDelete.includes(mid)&&d>=s&&d<=e){
        delete S.planning[k];if(_sb)_sb.from("planning").delete().eq("key",k).then(()=>{});count++;
      }
    });
    // Supprimer aussi le détail horaire m-work
    if(_sb){
      const dateFrom=fmtDate(s),dateTo=fmtDate(e);
      midsToDelete.forEach(mid=>{
        _sb.from("planning_detail").delete().eq("member_id",mid).gte("date",dateFrom).lte("date",dateTo).then(()=>{});
      });
      S.planningDetail=(S.planningDetail||[]).filter(r=>
        !(midsToDelete.includes(r.member_id)&&r.date>=dateFrom&&r.date<=dateTo)
      );
    }
    persist();
    const who=clearTarget==="all"?"tous les collaborateurs":(S.members.find(m=>m.id===clearTarget)?.name||clearTarget);
    alert(`${count} entrée${count>1?"s":""} supprimée${count>1?"s":""} pour ${who}.`);
    close();
  };

  const footer=mk("div","mfooter",{},[
    mk("button","btn",{onClick:close},["Annuler"]),
    mk("button","btn danger",{style:{flex:"2"},onClick:doConfirm},["Effacer définitivement"]),
  ]);

  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[
    mk("div","modal",{},[
      hdr,
      mk("p","grp-label",{},["Période à effacer"]),
      mk("div","",{style:{display:"flex",gap:"8px",marginBottom:"4px"}},[
        mk("div","",{style:{flex:"1"}},[mk("label","lf",{},["Du"]),startInp]),
        mk("div","",{style:{flex:"1"}},[mk("label","lf",{},["Au"]),endInp]),
      ]),
      qWrap,
      mk("p","grp-label",{},["Effacer pour"]),
      targetSel,
      confirmBox,
      footer,
    ]),
  ]);
}

// ─── MODAL STATISTIQUES ──────────────────────────────────────────────────────
function buildStatsModal(){
  const close=()=>{S.modal=null;render();};

  // ── Init période par défaut : mois courant
  const today=new Date();
  const ss=S.statsState;
  if(!ss.periodStart){
    ss.periodStart=new Date(today.getFullYear(),today.getMonth(),1);
    ss.periodEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
  }
  if(!ss.selectedMembers)ss.selectedMembers=new Set();

  // ── Helpers dates
  const monthStart=(d)=>new Date(d.getFullYear(),d.getMonth(),1);
  const monthEnd=(d)=>new Date(d.getFullYear(),d.getMonth()+1,0);
  const MONTH_RANGE=18; // mois affichés dans la frise (±9 autour d'aujourd'hui)
  const pivotMonth=new Date(today.getFullYear(),today.getMonth()-Math.floor(MONTH_RANGE/2),1);
  const months=Array.from({length:MONTH_RANGE},(_,i)=>new Date(pivotMonth.getFullYear(),pivotMonth.getMonth()+i,1));
  const totalMonths=months.length;

  const panel=document.createElement("div");panel.className="stats-panel";

  // ─ Topbar
  const topbar=mk("div","stats-topbar",[]);
  topbar.appendChild(mk("h3",{},["Statistiques"]));
  topbar.appendChild(mk("button","btn",{
    style:{padding:"5px 10px",fontSize:"12px",marginRight:"auto"},
    onClick:()=>{S.modal="crcDashboard";render();}
  },["📅 Planning CRC"]));
  topbar.appendChild(mk("button","btn",{style:{padding:"5px 10px",fontSize:"12px"},onClick:close},["Fermer"]));
  panel.appendChild(topbar);

  const body=document.createElement("div");body.className="stats-body";
  panel.appendChild(body);

  // ─ Section 1 : Frise chronologique
  body.appendChild(mk("p","grp-label",{},["Période d'analyse"]));

  // Indices de mois de début/fin dans la frise
  function monthIdx(d){return months.findIndex(m=>m.getFullYear()===d.getFullYear()&&m.getMonth()===d.getMonth());}
  let startIdx=Math.max(0,monthIdx(ss.periodStart));
  let endIdx=Math.min(totalMonths-1,monthIdx(ss.periodEnd));
  if(startIdx<0)startIdx=0;if(endIdx<0)endIdx=totalMonths-1;

  const datesDisplay=mk("div","timeline-dates");
  const startLbl=document.createElement("span");
  const endLbl=document.createElement("span");
  datesDisplay.appendChild(startLbl);datesDisplay.appendChild(endLbl);

  function updateLabels(){
    startLbl.textContent=MONTHS_SHORT[months[startIdx].getMonth()]+" "+months[startIdx].getFullYear();
    endLbl.textContent=MONTHS_SHORT[months[endIdx].getMonth()]+" "+months[endIdx].getFullYear();
  }

  const trackWrap=mk("div","timeline-wrap");
  const track=mk("div","timeline-track");
  const fill=mk("div","timeline-fill");
  const thumbStart=mk("div","timeline-thumb");thumbStart.dataset.role="start";
  const thumbEnd=mk("div","timeline-thumb");thumbEnd.dataset.role="end";
  track.appendChild(fill);track.appendChild(thumbStart);track.appendChild(thumbEnd);
  trackWrap.appendChild(datesDisplay);
  trackWrap.appendChild(track);

  // Mois labels sous la frise
  const labelsRow=mk("div","timeline-labels");
  const step=Math.floor(totalMonths/5);
  months.forEach((m,i)=>{if(i%step===0||i===totalMonths-1){const s=document.createElement("span");s.textContent=MONTHS_SHORT[m.getMonth()]+(i===0||m.getMonth()===0?" "+m.getFullYear():"");labelsRow.appendChild(s);}});
  trackWrap.appendChild(labelsRow);
  body.appendChild(trackWrap);

  function posFromIdx(idx){return idx/(totalMonths-1)*100;}
  function idxFromPct(pct){return Math.round(Math.min(1,Math.max(0,pct))*(totalMonths-1));}

  function updateTrack(){
    const s=posFromIdx(startIdx),e=posFromIdx(endIdx);
    fill.style.left=s+"%";fill.style.width=(e-s)+"%";
    thumbStart.style.left=s+"%";thumbEnd.style.left=e+"%";
    updateLabels();
    // update stats
    ss.periodStart=monthStart(months[startIdx]);
    ss.periodEnd=monthEnd(months[endIdx]);
    rebuildStats();
  }

  function makeDraggable(thumb,getIdx,setIdx,getOther){
    let dragging=false;
    function onMove(clientX){
      if(!dragging)return;
      const rect=track.getBoundingClientRect();
      const pct=(clientX-rect.left)/rect.width;
      let ni=idxFromPct(pct);
      if(thumb===thumbStart)ni=Math.min(ni,getOther()-1);
      else ni=Math.max(ni,getOther()+1);
      setIdx(ni);updateTrack();
    }
    thumb.addEventListener("mousedown",e=>{e.preventDefault();dragging=true;});
    window.addEventListener("mousemove",e=>{onMove(e.clientX);});
    window.addEventListener("mouseup",()=>{dragging=false;});
    thumb.addEventListener("touchstart",e=>{e.preventDefault();dragging=true;},{passive:false});
    thumb.addEventListener("touchmove",e=>{onMove(e.touches[0].clientX);},{passive:false});
    thumb.addEventListener("touchend",()=>{dragging=false;});
  }
  makeDraggable(thumbStart,()=>startIdx,(v)=>{startIdx=v;},()=>endIdx);
  makeDraggable(thumbEnd,()=>endIdx,(v)=>{endIdx=v;},()=>startIdx);

  // Clic sur la piste
  track.addEventListener("click",e=>{
    const rect=track.getBoundingClientRect();
    const pct=(e.clientX-rect.left)/rect.width;
    const ni=idxFromPct(pct);
    // Affecter au thumb le plus proche
    if(Math.abs(ni-startIdx)<=Math.abs(ni-endIdx)){startIdx=Math.min(ni,endIdx);}
    else{endIdx=Math.max(ni,startIdx);}
    updateTrack();
  });

  // Boutons rapides
  const quickBtns=mk("div","",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"8px",marginBottom:"4px"}});
  const mkQuick=(lbl,s,e)=>mk("button","btn",{style:{fontSize:"11px",padding:"4px 9px"},onClick:()=>{
    startIdx=Math.max(0,monthIdx(s));endIdx=Math.min(totalMonths-1,monthIdx(e));updateTrack();
  }},[lbl]);
  const y=today.getFullYear(),mo=today.getMonth();
  quickBtns.appendChild(mkQuick("Ce mois",new Date(y,mo,1),new Date(y,mo,1)));
  quickBtns.appendChild(mkQuick("Trim. en cours",new Date(y,mo-mo%3,1),new Date(y,mo-mo%3+2,1)));
  quickBtns.appendChild(mkQuick("Année "+y,new Date(y,0,1),new Date(y,11,1)));
  quickBtns.appendChild(mkQuick("12 derniers mois",new Date(y,mo-11,1),new Date(y,mo,1)));
  body.appendChild(quickBtns);

  // ─ Section 2 : Sélection membres
  body.appendChild(mk("p","grp-label",{style:{marginTop:"14px"}},["Collaborateur (camembert)"]));
  const memberGrid=mk("div","member-grid");

  // Non-admin : seulement son propre membre
  const statsVisibleMembers=isAdmin()?S.members:S.members.filter(m=>m.id===_auth.memberId);
  // Pré-sélectionner le membre de l'utilisateur connecté
  if(!isAdmin()&&_auth.memberId&&ss.selectedMembers.size===0){ss.selectedMembers.add(_auth.memberId);}

  // Single-select : 1 seul collaborateur pour le camembert
  // ss.selectedMembers contient 0 ou 1 id
  statsVisibleMembers.forEach(member=>{
    const isSel=ss.selectedMembers.has(member.id);
    const chip=mk("button","member-chip"+(isSel?" selected":""),{
      onClick:()=>{
        ss.selectedMembers.clear();
        if(!isSel)ss.selectedMembers.add(member.id);
        rebuildMemberChips();rebuildStats();
      }
    },[member.name+" ("+member.team+")"]);
    chip.dataset.mid=member.id;
    memberGrid.appendChild(chip);
  });
  body.appendChild(memberGrid);

  function rebuildMemberChips(){
    memberGrid.querySelectorAll("[data-mid]").forEach(chip=>{
      chip.className="member-chip"+(ss.selectedMembers.has(chip.dataset.mid)?" selected":"");
    });
  }

  const statsContainer=mk("div","",{style:{marginTop:"4px"}});
  body.appendChild(statsContainer);

  function getWorkSlots(mid){
    const result=[];
    const s=new Date(ss.periodStart.getFullYear(),ss.periodStart.getMonth(),1);
    const e=new Date(ss.periodEnd.getFullYear(),ss.periodEnd.getMonth()+1,0);
    let cur=new Date(s);
    while(cur<=e){
      const w=cur.getDay();
      if(w>=2&&w<=6){
        getDaySlots(cur).forEach(slot=>{
          result.push({d:new Date(cur),slot,act:getAct(mid,cur,slot)});
        });
      }
      cur=addDays(cur,1);
    }
    return result;
  }

  function countCRCWeeks(mid){
    // Compte les semaines contenant au moins 1 CRC
    const s=new Date(ss.periodStart.getFullYear(),ss.periodStart.getMonth(),1);
    const e=new Date(ss.periodEnd.getFullYear(),ss.periodEnd.getMonth()+1,0);
    const weekSet=new Set();
    let cur=new Date(s);
    while(cur<=e){
      const w=cur.getDay();
      if(w>=2&&w<=6){
        getDaySlots(cur).forEach(slot=>{
          if(getAct(mid,cur,slot)==="CRC"){
            weekSet.add(fmtDate(getMonday(cur)));
          }
        });
      }
      cur=addDays(cur,1);
    }
    return weekSet.size;
  }

  function computeMemberStat(mid){
    const allTeams=getTeams();
    const accCodes=[...allTeams.map((_,i)=>`A${i+1}`),"S"];
    const gdvCodes=allTeams.map((_,i)=>`G${i+1}`);
    const eqCodes=allTeams.map((_,i)=>`EQ${i+1}`);
    const slots=getWorkSlots(mid);
    const total=slots.length||1;
    const absentCodes=["R","F","CRC","TT","TP","DP","CP","CV","/","O",...eqCodes];
    const worked=slots.filter(s=>!absentCodes.includes(s.act)).length;
    const acc=slots.filter(s=>accCodes.includes(s.act)).length;
    const gdv=slots.filter(s=>gdvCodes.includes(s.act)).length;
    const lib=slots.filter(s=>s.act===".").length;
    const crcWeeks=countCRCWeeks(mid);
    const conges=slots.filter(s=>["CP","CV"].includes(s.act)).length; // demi-journées
    const m=S.members.find(x=>x.id===mid);
    return{mid,name:m?.name||mid,team:m?.team||"",total,worked,acc,gdv,lib,crcWeeks,conges};
  }

  function drawPie(canvas,slices){
    // slices: [{val, color, label}]
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height,R=Math.min(W,H)/2-4;
    const cx=W/2,cy=H/2;
    ctx.clearRect(0,0,W,H);
    const total=slices.reduce((a,s)=>a+s.val,0)||1;
    let angle=-Math.PI/2;
    slices.forEach(s=>{
      const sweep=s.val/total*2*Math.PI;
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,angle,angle+sweep);
      ctx.closePath();ctx.fillStyle=s.color;ctx.fill();
      // Stroke
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
      angle+=sweep;
    });
    // Centre donut hole
    ctx.beginPath();ctx.arc(cx,cy,R*0.45,0,2*Math.PI);
    ctx.fillStyle="#fff";ctx.fill();
  }

  function rebuildStats(){
    statsContainer.innerHTML="";
    const pct=(v,t)=>t>0?Math.round(v/t*100):0;

    // ── Camembert : 1 collaborateur sélectionné
    if(ss.selectedMembers.size===1){
      const mid=[...ss.selectedMembers][0];
      const ms=computeMemberStat(mid);
      const w=ms.worked||1;
      const pieSection=mk("div","stat-section");
      const periodStr=MONTHS_SHORT[ss.periodStart.getMonth()]+" "+ss.periodStart.getFullYear()+" → "+MONTHS_SHORT[ss.periodEnd.getMonth()]+" "+ss.periodEnd.getFullYear();
      pieSection.appendChild(mk("h4",{},[ms.name+" — "+ms.team+" · "+periodStr]));

      const pieWrap=mk("div","",{style:{display:"flex",alignItems:"center",gap:"18px",flexWrap:"wrap"}});

      const canvas=document.createElement("canvas");canvas.width=160;canvas.height=160;
      canvas.style.cssText="flex-shrink:0;border-radius:50%";
      pieWrap.appendChild(canvas);

      const pieLegend=mk("div","",{style:{display:"flex",flexDirection:"column",gap:"7px"}});
      const slices=[
        {val:ms.acc, color:"#0369a1", label:"Accueil", code:"A/S"},
        {val:ms.gdv, color:"#92400e", label:"Gestion valeurs", code:"G"},
        {val:ms.lib, color:"#166534", label:"Présence libre", code:"."},
        {val:ms.worked-(ms.acc+ms.gdv+ms.lib), color:"#9ca3af", label:"Autre (réu./coaching…)", code:""},
      ].filter(s=>s.val>0);

      slices.forEach(s=>{
        const row=mk("div","",{style:{display:"flex",alignItems:"center",gap:"8px",fontSize:"12px"}});
        const dot=mk("span","",{style:{width:"12px",height:"12px",borderRadius:"50%",background:s.color,flexShrink:"0",display:"inline-block"}});
        row.appendChild(dot);
        row.appendChild(mk("span","",{style:{color:"#374151"}},[(s.label+" "+(s.code?"("+s.code+")":""))]));
        row.appendChild(mk("span","",{style:{fontWeight:"600",color:s.color,marginLeft:"4px"}},[pct(s.val,w)+"%"]));
        pieLegend.appendChild(row);
      });
      pieWrap.appendChild(pieLegend);
      pieSection.appendChild(pieWrap);
      statsContainer.appendChild(pieSection);

      // Draw after DOM insertion
      requestAnimationFrame(()=>drawPie(canvas,slices));
    } else {
      statsContainer.appendChild(mk("p","stat-placeholder",{},["Sélectionnez un collaborateur pour afficher le camembert"]));
    }

    // ── Tableau de tous les collaborateurs (toujours visible)
    const allMids=isAdmin()?S.members.map(m=>m.id):S.members.filter(m=>m.id===_auth.memberId).map(m=>m.id);
    const tblSection=mk("div","stat-section",{style:{marginTop:"12px"}});
    const periodStr=MONTHS_SHORT[ss.periodStart.getMonth()]+" "+ss.periodStart.getFullYear()+" → "+MONTHS_SHORT[ss.periodEnd.getMonth()]+" "+ss.periodEnd.getFullYear();
    tblSection.appendChild(mk("h4",{},["Tous les collaborateurs · "+periodStr]));
    const tbl=document.createElement("table");
    tbl.style.cssText="width:100%;border-collapse:collapse;font-size:11px";
    const htr=tbl.insertRow();
    ["Collaborateur","Équipe","Acc.%","GDV%","Lib.%","CRC (sem.)","Congés (DJ)"].forEach(h=>{
      const th=document.createElement("th");
      th.style.cssText="text-align:left;padding:5px 6px;border-bottom:1.5px solid #e2e8f0;color:#6b7280;font-weight:500;font-size:10.5px;white-space:nowrap";
      th.textContent=h;htr.appendChild(th);
    });
    allMids.forEach(mid=>{
      const ms=computeMemberStat(mid);
      const w=ms.worked||1;
      const isSelected=ss.selectedMembers.has(mid);
      const tr=tbl.insertRow();
      if(isSelected)tr.style.background="#eff6ff";
      [ms.name,ms.team,
        pct(ms.acc,w)+"%",pct(ms.gdv,w)+"%",pct(ms.lib,w)+"%",
        String(ms.crcWeeks),
        String(ms.conges),
      ].forEach((val,ci)=>{
        const td=document.createElement("td");
        td.style.cssText="padding:5px 6px;border-bottom:0.5px solid #f1f5f9;font-size:11px"+(ci===0?";font-weight:500":ci>=5?";text-align:center":"");
        td.textContent=val;tr.appendChild(td);
      });
    });
    tblSection.appendChild(tbl);
    tblSection.appendChild(mk("p","",{style:{fontSize:"10px",color:"#94a3b8",marginTop:"6px"}},["DJ = demi-journées · CRC = semaines avec au moins 1 CRC · Congés = CP + CV"]));
    statsContainer.appendChild(tblSection);
  }

  updateTrack();

  return mk("div","stats-overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[panel]);
}

  _sb=window.supabase.createClient(_SURL,_SKEY);
}

// ─── GESTION TOKEN INVITATION ────────────────────────────────────────────────
// Détecte si l'URL contient un token d'invitation et bascule en mode "créer mot de passe"
let _inviteMode=false;

async function _checkInviteToken(){
  const hash=window.location.hash;
  // Supabase met le token dans le hash : #access_token=...&type=invite
  if(!hash.includes("type=invite")&&!hash.includes("type=recovery"))return;
  await _initSB();
  // Extraire les params du hash
  const params=new URLSearchParams(hash.replace("#",""));
  const accessToken=params.get("access_token");
  const refreshToken=params.get("refresh_token");
  if(!accessToken)return;
  // Définir la session temporaire
  const{data,error}=await _sb.auth.setSession({access_token:accessToken,refresh_token:refreshToken||""});
  if(error||!data.user)return;
  // Basculer en mode création de mot de passe
  _inviteMode=true;
  document.getElementById("ls-title").textContent="Créez votre mot de passe";
  document.getElementById("lem").style.display="none";
  document.getElementById("lpw").placeholder="Nouveau mot de passe (8 caractères min.)";
  document.getElementById("lpw2").style.display="block";
  document.getElementById("lbtn").textContent="Définir mon mot de passe";
  // Nettoyer l'URL
  history.replaceState(null,"",window.location.pathname);
}

document.getElementById("lbtn").addEventListener("click",async function(){
  const errDiv=document.getElementById("lerr");
  this.textContent="...";this.disabled=true;errDiv.textContent="";
  try{
    await _initSB();
    if(_inviteMode){
      // Mode création de mot de passe
      const pwd=document.getElementById("lpw").value;
      const pwd2=document.getElementById("lpw2").value;
      if(pwd.length<8){errDiv.textContent="Mot de passe trop court (8 caractères min.)";this.textContent="Définir mon mot de passe";this.disabled=false;return;}
      if(pwd!==pwd2){errDiv.textContent="Les mots de passe ne correspondent pas";this.textContent="Définir mon mot de passe";this.disabled=false;return;}
      const{data,error}=await _sb.auth.updateUser({password:pwd});
      if(error){errDiv.textContent="Erreur : "+error.message;this.textContent="Définir mon mot de passe";this.disabled=false;return;}
      _inviteMode=false;
      _showApp(data.user);
    } else {
      // Mode connexion normale
      const email=document.getElementById("lem").value.trim();
      const pwd=document.getElementById("lpw").value;
      const{data,error}=await _sb.auth.signInWithPassword({email,password:pwd});
      if(error){errDiv.textContent="Email ou mot de passe incorrect";this.textContent="Se connecter";this.disabled=false;return;}
      _showApp(data.user);
    }
  }catch(e){errDiv.textContent="Erreur réseau";this.textContent=_inviteMode?"Définir mon mot de passe":"Se connecter";this.disabled=false;}
});
document.getElementById("lpw").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("lbtn").click();});
document.getElementById("lpw2").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("lbtn").click();});

// Logout
async function logout(){
  clearTimeout(_persistTimer); // annuler tout persist en attente
  if(_sb)await _sb.auth.signOut();
  _auth={user:null,isAdmin:false,memberId:null};
  S.pendingEntries=[];
  _inviteMode=false;
  document.getElementById("app").style.display="none";
  document.getElementById("ls").style.display="flex";
  // Réinitialiser le formulaire
  const em=document.getElementById("lem");
  const pw=document.getElementById("lpw");
  const pw2=document.getElementById("lpw2");
  const btn=document.getElementById("lbtn");
  const err=document.getElementById("lerr");
  const title=document.getElementById("ls-title");
  if(em){em.value="";em.style.display="";}
  if(pw){pw.value="";pw.placeholder="Mot de passe";pw.style.display="";}
  if(pw2){pw2.value="";pw2.style.display="none";}
  if(btn){btn.textContent="Se connecter";btn.disabled=false;}
  if(err)err.textContent="";
  if(title)title.textContent="Connectez-vous pour accéder";
  // Restaurer la visibilité logo/nom
  const logo=document.getElementById("ls-logo");
  const appName=document.getElementById("ls-app-name");
  if(logo&&logo.src&&logo.src!==window.location.href){
    logo.style.display="block";
    if(appName)appName.style.display="none";
  }
  if(em)em.focus();
}

// Load Supabase SDK dynamically then check session
(function(){
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
  s.onload=async function(){
    await _initSB();
    // Charger le logo AVANT tout (indépendamment de la session)
    await _loadLoginLogo();
    await _checkInviteToken();
    if(_inviteMode)return;
    const{data:{session}}=await _sb.auth.getSession();
    if(session&&session.user){_showApp(session.user);}
  };
  s.onerror=function(){document.getElementById("lerr").textContent="Impossible de charger le service d'authentification.";};
  document.head.appendChild(s);
})();

async function _loadLoginLogo(){
  // D'abord depuis localStorage (instantané, pas besoin d'être connecté)
  try{
    const cached=localStorage.getItem("cadence31_logo");
    if(cached){
      const img=document.getElementById("ls-logo");
      const nm=document.getElementById("ls-app-name");
      if(img){img.src=cached;img.style.display="block";}
      if(nm)nm.style.display="none";
      return;
    }
  }catch(e){}
  // Sinon depuis Supabase (peut échouer si RLS bloque les anonymes)
  try{
    const{data:st}=await _sb.from("settings").select("value").eq("key","main").single();
    const logoUrl=st?.value?.logoDataUrl;
    if(logoUrl){
      try{localStorage.setItem("cadence31_logo",logoUrl);}catch(e){}
      const img=document.getElementById("ls-logo");
      const nm=document.getElementById("ls-app-name");
      if(img){img.src=logoUrl;img.style.display="block";}
      if(nm)nm.style.display="none";
    }
  }catch(e){}
}

  "69bbc128f6da1a436abc2e9b":"F",   // Formation

const MW_ACT_MAP={

  "69bbbef97a47336ded78361e":"ACCUEIL", // Renfort accueil
  "693044c2e4c31c90fc922c80":"GDV",     // Gestion des valeurs
};

// Normalise un nom pour la comparaison floue
function _normName(s){return(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();}
// Suggère le membre de notre app le plus proche du nom m-work
function _suggestMember(mwFirst,mwLast){
  const nFirst=_normName(mwFirst);
  const nLast=_normName(mwLast);
  const full1=nFirst+" "+nLast; // prénom nom
  const full2=nLast+" "+nFirst; // nom prénom (m-work parfois inversé)
  let best=null,bestScore=0;
  S.members.forEach(m=>{
    const mn=_normName(m.name);
    const parts=mn.split(" ");
    let score=0;
    // Correspondance exacte dans les deux sens
    if(mn===full1||mn===full2)score=10;
    // Prénom ET nom présents dans notre nom (ordre quelconque)
    else if(nFirst.length>1&&nLast.length>1&&mn.includes(nFirst)&&mn.includes(nLast))score=8;
    // Nom de famille seul (souvent suffisant et unique)
    else if(nLast.length>2&&mn.includes(nLast))score=5;
    // Prénom seul
    else if(nFirst.length>2&&mn.includes(nFirst))score=3;
    // Mots en commun (pour noms composés)
    else{
      const mwParts=[nFirst,...nLast.split("-"),...nFirst.split("-")];
      const common=mwParts.filter(w=>w.length>2&&parts.some(p=>p===w||p.startsWith(w)||w.startsWith(p))).length;
      if(common>0)score=common;
    }
    if(score>bestScore){bestScore=score;best=m;}
  });
  return bestScore>=3?best:null;
}

// Détermine le créneau (AM/PM) depuis startDate UTC
function _mwSlot(startDateStr){
  const h=new Date(startDateStr).getUTCHours();
  return h<11?"AM":"PM";
}

// Convertit les données m-work d'un user en entrées planning
// Priorité : activités ACCUEIL/GDV > shift type off > shift type office
function _mwUserToEntries(mwUser,ourMemberId){
  const entries={};

  // Résoudre le code équipe du membre dans notre app
  const ourMember=S.members.find(m=>m.id===ourMemberId);
  const teams=getTeams();
  const teamIdx=ourMember?teams.indexOf(ourMember.team):-1;
  const n=teamIdx>=0?teamIdx+1:1;
  // Codes équipe dynamiques
  const ACCUEIL_CODE=`A${n}`;  // ex: A1, A2…
  const GDV_CODE=`G${n}`;      // ex: G1, G2…

  const addEntry=(date,slot,act,override=false)=>{
    const key=`${ourMemberId}|${date}|${slot}`;
    if(!override&&entries[key])return;
    entries[key]={act,comment:""};
  };

  // Construire la map locationId → nom depuis les données m-work
  const mwLocMap=S._mwState?.mwData?.json?.company?.locations
    ? Object.fromEntries(S._mwState.mwData.json.company.locations.map(l=>[l.id,l.name]))
    : {};
  const mainLocId=mwUser.mainLocationId||"";

  // Résoudre un nom d'agence m-work → code activité de notre app (EQ1, EQ2, site perso…)
  const ACTS=buildACTS();
  function _mwLocToActCode(locName){
    if(!locName)return null;
    const norm=_normName(locName);
    // Chercher parmi toutes les activités dont le label ressemble
    let best=null,bestScore=0;
    Object.entries(ACTS).forEach(([code,a])=>{
      if(!a.l)return;
      const al=_normName(a.l);
      // Score : correspondance exacte > contenu > mots communs
      let score=0;
      if(al===norm)score=10;
      else if(al.includes(norm)||norm.includes(al))score=5;
      else{
        // Compter les mots en commun
        const wa=new Set(al.split(" "));
        const wn=norm.split(" ");
        const common=wn.filter(w=>w.length>3&&wa.has(w)).length;
        if(common>0)score=common;
      }
      if(score>bestScore){bestScore=score;best=code;}
    });
    return bestScore>=2?best:null;
  }

  // 1. Shifts de base (présence / absence)
  mwUser.scheduledShifts.forEach(s=>{
    const date=s.planningDate;
    const slot=s.dayPart;
    if(!date||!slot)return;
    let act,comment="";
    if(s.type==="office"){
      const locId=s.locationId||"";
      if(MW_LOC_MAP[locId]){
        // Lieu spécial connu (Formation, CRC, Réunion…)
        act=MW_LOC_MAP[locId];
      } else if(locId&&locId!==mainLocId){
        // Agence différente → chercher le code activité correspondant
        const locName=mwLocMap[locId]||"";
        act=_mwLocToActCode(locName)||".";
        if(act===".")comment=locName; // non trouvé → présent avec commentaire
      } else {
        act=".";
      }
    } else if(s.type==="off"){
      act=s.offTypeId?MW_OFFTYPE_MAP[s.offTypeId]||"O":"/";
    }
    if(act){
      const key=`${ourMemberId}|${date}|${slot}`;
      if(!entries[key])entries[key]={act,comment};
    }
  });

  // 2. Activités Accueil/GDV (écrasent le shift)
  (mwUser.activities||[]).forEach(a=>{
    const type=MW_ACT_MAP[a.activityId];
    if(!type)return;
    const date=a.startDate?.slice(0,10);
    if(!date)return;
    const slot=_mwSlot(a.startDate);
    const act=type==="ACCUEIL"?ACCUEIL_CODE:GDV_CODE;
    addEntry(date,slot,act,true);
  });

  // 3. Demandes depuis timeOffRequests intégré dans getPlannerData (ancien système)
  // Gardé pour compatibilité mais normalement vide
  (mwUser.timeOffRequests||[]).forEach(r=>{
    if(r.status==="DENIED")return;
    _processTimeOffRequest(r, mwUser.id, addEntry);
  });

  return entries;
}

// Traite une demande time_off_request → entrées planning
// APPROVED→CV, PENDING→CP, DENIED→ignoré
function _processTimeOffRequest(r, mwUserId, addEntryFn){
  if(r.status==="DENIED")return;
  const act=r.status==="APPROVED"?"CV":"CP";
  const debut=r.startDate||"";
  const fin=r.endDate||debut;
  if(!debut)return;
  const d=new Date(debut+"T12:00:00");
  const f=new Date(fin+"T12:00:00");
  if(isNaN(d.getTime()))return;
  while(d<=f){
    if(d.getDay()!==0){ // pas dimanche
      const dateStr=fmtDate(d);
      const isFirst=dateStr===debut;
      const isLast=dateStr===fin;
      // Déterminer les slots selon startHalf/endHalf
      let slots=["AM","PM"];
      if(isFirst&&isLast){
        // Même jour : startHalf → endHalf
        if(r.startHalf===r.endHalf)slots=[r.startHalf||"AM"];
        else slots=["AM","PM"]; // AM→PM = journée entière
      } else if(isFirst){
        slots=r.startHalf==="PM"?["PM"]:["AM","PM"];
      } else if(isLast){
        slots=r.endHalf==="AM"?["AM"]:["AM","PM"];
      }
      slots.forEach(slot=>addEntryFn(dateStr,slot,act,true));
    }
    d.setDate(d.getDate()+1);
  }
}

      const opt=mk("option","",{value:String(y)},[String(y)]);
      if(y===curYear)opt.selected=true;
      yearSel.appendChild(opt);
    });
    if(!mw.year)mw.year=curYear;
    yearSel.addEventListener("change",()=>{mw.year=parseInt(yearSel.value);});
    const yearRow=mk("div","frow",{style:{marginBottom:"10px",display:mw.yearMode?"flex":"none"}},[
      mk("label","lf",{style:{minWidth:"90px"}},["Année"]),yearSel]);
    box.appendChild(yearRow);

    const errEl=mk("p","",{style:{color:"#ef4444",fontSize:"12px",minHeight:"18px",margin:"0 0 8px"}});
    const btnFetch=mk("button","btn",{
      style:{background:"#2563eb",color:"#fff",width:"100%"},
      onClick:async()=>{
        if(!mw.cookie){errEl.textContent="Cookie requis";return;}
        btnFetch.disabled=true;errEl.textContent="";

        try{
          // Construire la liste des mois à fetcher
          let months=[];
          if(mw.yearMode){
            btnFetch.textContent="Chargement 1/12…";
            for(let m=1;m<=12;m++){
              months.push(`${mw.year}-${String(m).padStart(2,"0")}-01`);
            }
          } else {
            months=[mw.date||`${curYear}-01-01`];
            btnFetch.textContent="Chargement…";
          }

          // Fetcher chaque mois et fusionner les données users
          let mergedUsers=null;
          let baseData=null;
          for(let i=0;i<months.length;i++){
            if(months.length>1)btnFetch.textContent=`Chargement ${i+1}/${months.length}…`;
            const resp=await fetch(MW_PROXY_URL,{
              method:"POST",
              headers:{"Content-Type":"application/json","Authorization":`Bearer ${_SKEY}`},
              body:JSON.stringify({cookie:mw.cookie,date:months[i],mode:"month"}),
            });
            if(!resp.ok){const t=await resp.text();throw new Error(t);}
            const data=await resp.json();
            if(data.error)throw new Error(data.error);
            if(!baseData){baseData=data;mergedUsers=data.json.planner.users.map(u=>({...u,scheduledShifts:[...u.scheduledShifts],activities:[...u.activities]}));}
            else{
              // Fusionner shifts et activities de chaque mois
              data.json.planner.users.forEach(mu=>{
                const existing=mergedUsers.find(u=>u.id===mu.id);
                if(existing){
                  existing.scheduledShifts.push(...mu.scheduledShifts);
                  existing.activities.push(...mu.activities);
                }
              });
            }
          }
          // Reconstruire mwData avec les users fusionnés
          baseData.json.planner.users=mergedUsers;
          mw.mwData=baseData;
          mw.timeOffRequests=baseData.timeOffRequestList||[];
          // Catalogue d'activités (id → {name, color, code})
          mw.activityCatalog=Object.assign(mw.activityCatalog||{},baseData.activityCatalog||{});
          mw.yearMode?mw.importLabel=`Année ${mw.year}`:mw.importLabel=`${months[0].slice(0,7)}`;

          // Mapping membres
          mw.mapping=mergedUsers.map(u=>({
            mwId:u.id,mwName:`${u.firstName} ${u.lastName}`,
            mwUser:u,
            ourMember:_suggestMember(u.firstName,u.lastName),
            include:true,
          }));
          setStep(2);
        }catch(err){
          errEl.textContent="Erreur : "+(err.message||"vérifiez le cookie");
          btnFetch.disabled=false;btnFetch.textContent="Récupérer les données";
        }
      }
    },["Récupérer les données"]);
    box.appendChild(errEl);
    box.appendChild(btnFetch);
  }

  // ── ÉTAPE 2 : Mapping membres ─────────────────────────────────────────────
  else if(mw.step===2){
    box.appendChild(mk("p","",{style:{fontSize:"12px",color:"#6b7280",margin:"0 0 10px"}},
      [`${mw.mapping.length} membres trouvés dans m-work. Vérifiez la correspondance avec vos membres.`]));

    const rows=mw.mapping.map((m,i)=>{
      const chk=mk("input","",{type:"checkbox"});
      chk.checked=m.include;
      chk.addEventListener("change",()=>{mw.mapping[i].include=chk.checked;sel.disabled=!chk.checked;});

      const sel=mk("select","",{style:{flex:"1",fontSize:"12px",padding:"3px"}});
      sel.appendChild(mk("option","",{value:""},"— Ignorer —"));
      S.members.forEach(mb=>{
        const opt=mk("option","",{value:mb.id},[mb.name]);
        if(m.ourMember&&m.ourMember.id===mb.id)opt.selected=true;
        sel.appendChild(opt);
      });
      sel.addEventListener("change",()=>{
        mw.mapping[i].ourMember=S.members.find(mb=>mb.id===sel.value)||null;
      });
      sel.disabled=!m.include;

      return mk("div","",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:"1px solid #f3f4f6"}},[
        chk,
        mk("span","",{style:{fontSize:"12px",minWidth:"130px",color:"#374151"}},[m.mwName]),
        mk("span","",{style:{fontSize:"11px",color:"#9ca3af"}},"→"),
        sel,
      ]);
    });

    const listBox=mk("div","",{style:{maxHeight:"40vh",overflowY:"auto",marginBottom:"12px"}},rows);
    box.appendChild(listBox);
    box.appendChild(mk("div","mfooter",{style:{display:"flex",gap:"8px"}},[
      mk("button","btn",{onClick:()=>setStep(1)},["← Retour"]),
      mk("button","btn",{style:{background:"#2563eb",color:"#fff",flex:"1"},onClick:()=>{
        // Calculer aperçu
        let total=0;
        mw.mapping.forEach(m=>{
          if(!m.include||!m.ourMember)return;
          const entries=_mwUserToEntries(m.mwUser,m.ourMember.id);
          total+=Object.keys(entries).length;
        });
        mw._totalEntries=total;
        setStep(3);
      }},["Aperçu →"]),
    ]));
  }

  // ── ÉTAPE 3 : Aperçu + import ─────────────────────────────────────────────
  else if(mw.step===3){
    const mapped=mw.mapping.filter(m=>m.include&&m.ourMember);
    box.appendChild(mk("p","",{style:{fontSize:"13px",margin:"0 0 4px"}},[
      `✓ ${mapped.length} membres · ${mw._totalEntries||"?"} créneaux à importer`]));
    box.appendChild(mk("p","",{style:{fontSize:"12px",color:"#6b7280",margin:"0 0 12px"}},[
      `Période : ${mw.importLabel||mw.date?.slice(0,7)||"?"} — Les créneaux existants seront écrasés.`]));

    // Résumé par membre
    const summaryRows=mapped.map(m=>{
      const entries=_mwUserToEntries(m.mwUser,m.ourMember.id);
      const counts={};
      Object.values(entries).forEach(e=>{counts[e.act]=(counts[e.act]||0)+1;});
      const badges=Object.entries(counts).map(([code,n])=>{
        const ACTS=buildACTS();
        const a=ACTS[code];
        return mk("span","",{style:{background:a?.bg||"#e5e7eb",color:a?.c||"#111",padding:"1px 5px",borderRadius:"8px",fontSize:"10px",marginRight:"3px"}},[`${code}×${n}`]);
      });
      return mk("div","",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"4px 0",borderBottom:"1px solid #f3f4f6"}},[
        mk("span","",{style:{fontSize:"12px",minWidth:"120px"}},[m.ourMember.name]),
        mk("span","",{style:{display:"flex",flexWrap:"wrap",gap:"2px"}},badges),
      ]);
    });
    box.appendChild(mk("div","",{style:{maxHeight:"35vh",overflowY:"auto",marginBottom:"12px"}},summaryRows));

    const errEl=mk("p","",{style:{color:"#ef4444",fontSize:"12px",minHeight:"18px",margin:"0 0 6px"}});
    box.appendChild(errEl);
    box.appendChild(mk("div","mfooter",{style:{display:"flex",gap:"8px"}},[
      mk("button","btn",{onClick:()=>setStep(2)},["← Retour"]),
      mk("button","btn",{style:{background:"#16a34a",color:"#fff",flex:"1"},onClick:async(ev)=>{
        ev.target.disabled=true;ev.target.textContent="Import…";errEl.textContent="";
        try{
          // Fusionner toutes les entrées (shifts + activités)
          const allEntries={};
          mapped.forEach(m=>{
            Object.assign(allEntries,_mwUserToEntries(m.mwUser,m.ourMember.id));
          });

          // Ajouter les demandes de congés globales (time_off_request)
          // Construire un index mwUserId → ourMemberId
          const mwToOur={};
          mapped.forEach(m=>{if(m.include&&m.ourMember)mwToOur[m.mwId]=m.ourMember.id;});
          (mw.timeOffRequests||[]).forEach(r=>{
            const ourMemberId=mwToOur[r.userId];
            if(!ourMemberId)return;
            _processTimeOffRequest(r, r.userId, (date,slot,act,override)=>{
              const key=`${ourMemberId}|${date}|${slot}`;
              if(override||!allEntries[key])allEntries[key]={act,comment:r.collabComment||""};
            });
          });

          // Import simple — upsert uniquement, sans effacement
          ev.target.textContent="Import…";
          const rows=Object.entries(allEntries).map(([key,v])=>({key,act:v.act,comment:v.comment||"",count_as:null}));
          const chunkSize=200;
          for(let i=0;i<rows.length;i+=chunkSize){
            await _sb.from("planning").upsert(rows.slice(i,i+chunkSize),{onConflict:"key"});
          }
          Object.entries(allEntries).forEach(([key,v])=>{S.planning[key]=v;});

          // Sauvegarder le détail horaire (planning_detail)
          ev.target.textContent="Détail…";
          const catalog=mw.activityCatalog||{};
          const detailRows=[];
          mapped.forEach(m=>{
            (m.mwUser.activities||[]).forEach(a=>{
              if(!a.startDate||!a.activityId)return;
              const date=a.startDate.slice(0,10);
              const startH=new Date(a.startDate).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});
              const endH=new Date(a.endDate).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});
              const cat=catalog[a.activityId]||{};
              detailRows.push({
                member_id:m.ourMember.id,
                date,
                start_time:startH,
                end_time:endH,
                activity_id:a.activityId,
                activity_name:cat.name||"",
                activity_code:cat.code||"",
                activity_color:cat.color||"",
              });
            });
          });
          // Supprimer les anciennes lignes pour ces membres/dates puis réinsérer
          const detailDates=[...new Set(detailRows.map(r=>r.date))];
          const detailMembers=[...new Set(detailRows.map(r=>r.member_id))];
          if(detailDates.length>0){
            for(const mid of detailMembers){
              await _sb.from("planning_detail").delete()
                .eq("member_id",mid)
                .gte("date",detailDates[0])
                .lte("date",detailDates[detailDates.length-1]);
            }
          }
          for(let i=0;i<detailRows.length;i+=chunkSize){
            await _sb.from("planning_detail").insert(detailRows.slice(i,i+chunkSize));
          }
          S.planningDetail=detailRows; // cache local

          S._mwState=null;S.modal=null;render();
        }catch(err){
          errEl.textContent="Erreur import : "+(err.message||err);
          ev.target.disabled=false;ev.target.textContent="Importer";
        }
      }},["Importer"]),
    ]));
  }

  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget){S._mwState=null;close();}}},[box]);
}

// ─── GESTION BUREAUX ──────────────────────────────────────────────────────────

// Postes "managers" qui ont bureau propre même en open space
const MANAGER_ABBRS=["DDGA","DA","DAP","AdjP"];

// Calcule le nombre de bureaux disponibles pour une équipe/date/slot
function deskAvailable(team,d,slot){
  const ts=S.settings.teamSettings?.[team]||{};
  const bureaux=ts.bureauxFixes;
  if(bureaux==null)return null; // non configuré
  const dateStr=fmtDate(d);
  const teams=getTeams();
  const teamIdx=teams.indexOf(team);
  const an=`A${teamIdx+1}`;
  const gn=`G${teamIdx+1}`;

  // Présents sur site pour cette équipe/slot
  const rows=S.members.filter(m=>m.team===team).map(m=>{
    const entry=getEntry(m.id,d,slot);
    const act=getAct(m.id,d,slot);
    const ct=getEffectiveCountTeam(m.id,act,entry);
    return{act,ct,mid:m.id,post:m.post||""};
  }).filter(r=>r.ct===team);

  const presents=rows.length;

  // Personne à l'accueil → son bureau est libéré
  const hasAccueil=rows.some(r=>r.act==="S"||r.act===an);
  const accueilBonus=hasAccueil?1:0;

  // Managers avec bureau propre (open space uniquement)
  let managerBonus=0;
  if(ts.openSpace){
    managerBonus=rows.filter(r=>MANAGER_ABBRS.includes(r.post)).length;
  }

  // Réservations acceptées ou en attente sur ce créneau
  const booked=S.deskBookings.filter(b=>
    b.team===team&&b.date===dateStr&&b.slot===slot&&
    (b.status==="pending"||b.status==="approved")
  ).length;

  return Math.max(0, bureaux - presents + accueilBonus + managerBonus - booked);
}

// ─── VUE VISITEUR ─────────────────────────────────────────────────────────────
function buildRequestBasketModal(){
  const ACTS=buildACTS();
  const close=()=>{S.modal=null;render();};
  const entries=S.pendingEntries;

  if(entries.length===0){S.modal=null;render();return mk("div");}

  // Grouper par code + journée pour l'affichage
  const byCode={};
  entries.forEach(({cells,code})=>{
    cells.forEach(key=>{
      const[,dateStr,slot]=key.split("|");
      const d=new Date(dateStr);
      const date_label=`${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
      if(!byCode[code])byCode[code]=[];
      byCode[code].push({key,act:code,date_label,slot});
    });
  });
  // Regrouper AM+PM en journée
  const byCodeGrouped={};
  Object.entries(byCode).forEach(([code,es])=>{
    byCodeGrouped[code]=_groupEntriesByDay(es);
  });

  const sections=Object.entries(byCodeGrouped).map(([code,grouped])=>{
    const a=ACTS[code];
    const badge=mk("span","",{style:{
      display:"inline-block",padding:"2px 8px",borderRadius:"10px",fontSize:"12px",
      fontWeight:"bold",background:a?.bg||"#e5e7eb",color:a?.c||"#111",marginBottom:"6px"
    }},[`${code} — ${a?.l||code}`]);
    const ul=mk("ul","",{style:{margin:"0 0 10px 16px",padding:0,fontSize:"13px"}},
      grouped.map(g=>mk("li","",{style:{marginBottom:"2px"}},[
        `${g.label} — ${_slotLabel(g.slot)}`,
        mk("button","",{
          style:{marginLeft:"8px",fontSize:"10px",background:"none",border:"none",color:"#ef4444",cursor:"pointer",padding:"0"},
          onClick:()=>{
            // Supprimer les clés correspondantes du panier (AM et/ou PM selon slot)
            S.pendingEntries=S.pendingEntries.map(pe=>{
              if(pe.code!==code)return pe;
              const remaining=pe.cells.filter(k=>{
                const[,ds]=k.split("|");
                return ds!==g.dateStr;
              });
              return remaining.length>0?{...pe,cells:remaining}:null;
            }).filter(Boolean);
            if(S.pendingEntries.length===0)S.modal=null;
            render();
          }
        },["✕"])
      ]))
    );
    return mk("div","",{},[badge,ul]);
  });

  const icon=mk("div","",{style:{fontSize:"32px",textAlign:"center",marginBottom:"6px"}},["📋"]);
  const title=mk("h3","",{style:{margin:"0 0 4px",textAlign:"center"}},["Ma demande"]);
  const desc=mk("p","",{style:{fontSize:"12px",color:"#6b7280",margin:"0 0 12px",textAlign:"center"}},
    ["Récapitulatif des absences à soumettre pour validation"]);

  const body=mk("div","",{style:{maxHeight:"50vh",overflowY:"auto",marginBottom:"4px"}},sections);

  const btnClear=mk("button","btn danger",{
    style:{padding:"6px 10px",fontSize:"12px"},
    onClick:()=>{S.pendingEntries=[];S.modal=null;render();}
  },["✕ Vider"]);

  const btnSend=mk("button","btn",{
    style:{background:"#2563eb",color:"#fff",flex:"1"},
    onClick:async()=>{
      btnSend.disabled=true;btnSend.textContent="Envoi…";
      await _submitRequest([...S.pendingEntries]);
      S.pendingEntries=[];S.modal=null;render();
    }
  },["✉ Envoyer la demande"]);

  const footer=mk("div","mfooter",{style:{display:"flex",gap:"8px",alignItems:"center"}},[btnClear,btnSend]);
  const box=mk("div","modal",{style:{maxWidth:"380px"}},[icon,title,desc,body,footer]);
  return mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[box]);
}

// ─── MODAL DEMANDES ADMIN ─────────────────────────────────────────────────────
function buildRequestsAdminModal(){
  const close=()=>{S.modal=null;render();};
  const ACTS=buildACTS();
  const MAP={CP:"CV",TP:"TT",DP:"DV"};

  // Tri : pending en premier, puis par date desc
  const sorted=[...S.requests].sort((a,b)=>{
    if(a.status==="pending"&&b.status!=="pending")return -1;
    if(b.status==="pending"&&a.status!=="pending")return 1;
    return new Date(b.created_at)-new Date(a.created_at);
  });

  const rows=sorted.length===0
    ?[mk("p","",{style:{color:"#6b7280",fontStyle:"italic",padding:"12px 0"}},["Aucune demande."])]
    :sorted.map(req=>{
      const isPending=req.status==="pending";
      const actLabel=ACTS[req.entries?.[0]?.act]?.l||req.entries?.[0]?.act||"?";
      const validatedLabel=MAP[req.entries?.[0]?.act]||"";
      const statusEl=mk("span","",{style:{
        display:"inline-block",padding:"1px 7px",borderRadius:"10px",fontSize:"11px",fontWeight:"bold",
        background:isPending?"#fef3c7":req.status==="approved"?"#dcfce7":"#fee2e2",
        color:isPending?"#92400e":req.status==="approved"?"#166534":"#b91c1c",
      }},[isPending?"En attente":req.status==="approved"?"Validé ✓":"Refusé ✗"]);

      const grouped=_groupEntriesByDay(req.entries);
      const byCodeMap={};
      grouped.forEach(g=>{if(!byCodeMap[g.act])byCodeMap[g.act]=[];byCodeMap[g.act].push(g);});
      const actSections=Object.entries(byCodeMap).map(([code,gs])=>{
        const a=ACTS[code];
        const codeLabel=a?.l||code;
        const toLabel=MAP[code]?` → ${ACTS[MAP[code]]?.l||MAP[code]}`:"";
        return mk("div","",{style:{marginBottom:"6px"}},[
          mk("span","",{style:{fontSize:"11px",fontWeight:"bold",color:a?.c||"#111",background:a?.bg||"#e5e7eb",padding:"1px 6px",borderRadius:"8px"}},[`${code} — ${codeLabel}${toLabel}`]),
          mk("ul","",{style:{margin:"3px 0 0 14px",padding:0,fontSize:"12px",color:"#4b5563"}},

      const header=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},[
        mk("strong","",{},[req.member_name]),
        statusEl,
      ]);
      const btns=isPending?mk("div","",{style:{display:"flex",gap:"6px"}},[
        mk("button","btn",{
          style:{flex:"1",background:"#16a34a",color:"#fff",padding:"5px"},
          onClick:async(ev)=>{ev.target.disabled=true;ev.target.textContent="…";await _approveRequest(req);}
        },["✓ Valider"]),
        mk("button","btn danger",{
          style:{flex:"1",padding:"5px"},
          onClick:async(ev)=>{ev.target.disabled=true;ev.target.textContent="…";await _rejectRequest(req);}
        },["✗ Refuser"]),
      ]):null;

      const createdAt=new Date(req.created_at);
      const dateStr=`${createdAt.getDate()} ${MONTHS_SHORT[createdAt.getMonth()]} ${createdAt.getFullYear()}`;
      const meta=mk("p","",{style:{margin:"0",fontSize:"10px",color:"#9ca3af"}},["Soumis le "+dateStr]);

      return mk("div","",{style:{
        border:"1px solid "+(isPending?"#fcd34d":"#e5e7eb"),
        borderRadius:"8px",padding:"10px 12px",marginBottom:"10px",
        background:isPending?"#fffbeb":"#fafafa"
      }},[header,...actSections,meta,...(btns?[btns]:[])]);
    });

  const pendingConges=S.requests.filter(r=>r.status==="pending").length;
  const pendingBureaux=S.deskBookings.filter(b=>b.status==="pending").length;
  const totalPending=pendingConges+pendingBureaux;

  // ─ Header avec fermeture
  const header=mk("div","",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
    mk("h3","",{style:{margin:0}},[`✉ Demandes${totalPending>0?` (${totalPending} en attente)`:""}`]),
    mk("button","mclose",{onClick:close},["×"]),
  ]);

  // ─ Filtres
  const filterCongesInp=mk("input","",{type:"text",placeholder:"Filtrer par collaborateur…",
    style:{flex:"1",padding:"5px 8px",fontSize:"12px",border:"0.5px solid #d1d5db",borderRadius:"6px",outline:"none"}});
  const filterBureauInp=mk("input","",{type:"text",placeholder:"Filtrer par agence…",
    style:{flex:"1",padding:"5px 8px",fontSize:"12px",border:"0.5px solid #d1d5db",borderRadius:"6px",outline:"none"}});
  const filtersRow=mk("div","",{style:{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}},[
    filterCongesInp,filterBureauInp,
  ]);

  // ─ Conteneur des cartes (re-filtrable)
  const bodyEl=mk("div","",{style:{maxHeight:"62vh",overflowY:"auto"}});

  function applyFilters(){
    const fc=filterCongesInp.value.trim().toLowerCase();

  // ─ Assemblage final
  const footer=mk("div","mfooter",[mk("button","btn",{onClick:close},["Fermer"])]);

  const overlay=mk("div","overlay",{onClick:e=>{if(e.target===e.currentTarget)close();}},[box]);

  // ─ Construire les cartes bureaux
  const deskCards=S.deskBookings.map(bk=>{
    const isPendingB=bk.status==="pending";
    const d=new Date(bk.date+"T12:00:00");
    const dayLbl=`${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
    const slotLbl=bk.slot==="AM"?"Matin":"Après-midi";
